  "2.1":"정책, 조직, 자산 관리","2.2":"인적 보안","2.3":"외부자 보안","2.4":"물리 보안","2.5":"인증 및 권한관리","2.6":"접근통제","2.7":"암호화 적용","2.8":"정보시스템 도입 및 개발 보안","2.9":"시스템 및 서비스 운영관리","2.10":"시스템 및 서비스 보안관리","2.11":"사고 예방 및 대응","2.12":"재해복구",
  "3.1":"개인정보 수집 시 보호조치","3.2":"개인정보 보유·이용 시 보호조치","3.3":"개인정보 제공 시 보호조치","3.4":"개인정보 파기 시 보호조치","3.5":"정보주체 권리보호"
});
function controlFieldCode(code){return String(code).split(".").slice(0,2).join(".");}
function renderControls(){
  const areaOrder=["관리체계 수립·운영","보호대책 요구사항","개인정보 처리단계별 요구사항"];
  const makeArea=(area)=>{
    const controls=COVERAGE.controls.filter(c=>c.area===area);
    const fieldCodes=[...new Set(controls.map(c=>controlFieldCode(c.code)))];
    const fields=fieldCodes.map(fieldCode=>{
      const members=controls.filter(c=>controlFieldCode(c.code)===fieldCode);
      return `<details class="tree-field"><summary><span>${esc(fieldCode)} ${esc(CONTROL_FIELD_TITLES[fieldCode]||"")}</span><span class="tree-field-count">${members.length}개</span></summary><div class="tree-control-list">${members.map(c=>`<details class="tree-control" data-code="${esc(c.code)}" data-search="${esc(`${c.code} ${c.name} ${c.detail}`)}"><summary><span class="tree-code">${esc(c.code)}</span><span class="tree-name">${esc(c.name)}</span></summary><div class="tree-control-body"><h4>인증기준</h4><p>${esc(c.detail)}</p></div></details>`).join("")}</div></details>`;
    }).join("");
    return `<details class="tree-area" open><summary><span>${esc(area)}</span><span class="tree-area-count">${controls.length}개 통제항목</span></summary><div class="tree-field-list">${fields}</div></details>`;
  };
  $("#app").innerHTML=`<main class="results"><section class="result-head"><div><div class="eyebrow">통제항목</div><h1>ISMS-P 통제항목</h1><p>기준일 ${esc(COVERAGE.basisDate)} · 101개 인증기준을 영역 → 분야 → 통제항목 순으로 정리했습니다.</p></div><div class="result-actions"><button class="secondary home-button" id="home">처음 화면</button></div></section>
  <section class="panel review"><h2>통제항목 트리</h2><p class="tree-summary">통제항목을 펼치면 해당 인증기준을 확인할 수 있습니다.</p><div class="tree-toolbar"><input id="controlSearch" type="search" placeholder="코드·통제항목·인증기준으로 검색" aria-label="통제항목 검색"><button class="secondary compact" id="expandAll">전체 펼치기</button><button class="secondary compact" id="collapseAll">전체 접기</button></div><div id="treeEmpty" class="tree-empty" hidden>검색 조건에 맞는 통제항목이 없습니다.</div><div id="controlTree" class="tree-root">${areaOrder.map(makeArea).join("")}</div></section><section class="panel footnote" aria-label="공식 인증기준 안내서 링크"><h3>공식 원문 확인</h3><p>통제항목과 인증기준의 공식 원문은 <a href="https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmDetail.do" target="_blank" rel="noopener">ISMS-P 인증기준 안내서</a>에서 확인하세요.</p></section></main>`;
  $("#home").onclick=()=>{
    if(new URLSearchParams(window.location.search).get("view")==="controls" && window.opener){window.close();}
    else renderStart();
  };
  $("#expandAll").onclick=()=>document.querySelectorAll("#controlTree details").forEach(d=>d.open=true);
  $("#collapseAll").onclick=()=>document.querySelectorAll("#controlTree details").forEach(d=>d.open=false);
  $("#controlSearch").oninput=(event)=>{
    const raw=String(event.target.value||"").trim();
    const term=norm(raw);
    const isControlCode=/^\d+(?:\.\d+)+$/.test(raw);
    const controls=[...document.querySelectorAll(".tree-control")];
    let visible=0;
    controls.forEach(node=>{
      const code=String(node.dataset.code||"");
      const matched=!raw || (isControlCode
        ? (code===raw || code.startsWith(`${raw}.`))
        : norm(node.dataset.search||"").includes(term));
      node.classList.toggle("tree-hidden",!matched);
      if(matched) visible++;
      if(raw&&matched){node.open=true; const field=node.closest(".tree-field"); const area=node.closest(".tree-area"); if(field) field.open=true; if(area) area.open=true;}
    });
    document.querySelectorAll(".tree-field").forEach(field=>{
      const hasVisible=[...field.querySelectorAll(".tree-control")].some(n=>!n.classList.contains("tree-hidden"));
      field.classList.toggle("tree-hidden",!!raw&&!hasVisible);
    });
    document.querySelectorAll(".tree-area").forEach(area=>{
      const hasVisible=[...area.querySelectorAll(".tree-control")].some(n=>!n.classList.contains("tree-hidden"));
      area.classList.toggle("tree-hidden",!!raw&&!hasVisible);
    });
    $("#treeEmpty").hidden=visible>0;
  };
}
function openControlsPopup(){
  const target=new URL(window.location.href);
  target.search=""; target.hash=""; target.searchParams.set("view","controls");
  const popup=window.open(target.toString(),"ISMSPControlCatalog","width=1120,height=820,resizable=yes,scrollbars=yes");
  if(popup) popup.focus();
  else alert("브라우저가 새 창을 차단했습니다. 팝업을 허용한 뒤 다시 시도해 주세요.");
}
function renderExam(){
  if(!state) return renderStart();
  $("#app").innerHTML=`
  <div class="exam-shell">
    <header class="topbar">
      <div class="brand"><small>ISMS-P · 2026년 6월</small>${esc(state.title)}</div>
      <div class="metrics"><span id="save">자동 저장</span><b id="timer">00:00:00</b><button class="compact danger" id="finish">제출</button></div>
    </header>
    <div class="exam-layout">
      <aside class="nav">
        <div class="nav-title"><b>문항 현황</b><span id="progress"></span></div>
        <div class="legend"><span><i class="lg"></i>미응답</span><span><i class="lg answered"></i>응답</span><span><i class="lg flag"></i>표시</span></div>
        <div id="qnav" class="qnav"></div>
        <div class="nav-actions"><button class="secondary" id="exit">저장 후 나가기</button><button class="text" id="reset">현재 응시 삭제</button><a class="secondary controls-shortcut" id="examControls" href="?view=controls" target="_blank" rel="noopener" title="새 탭에서 통제항목 열기" aria-label="새 탭에서 통제항목 열기">통제항목 ↗</a></div>
      </aside>
      <main class="question-pane"><div id="question"></div></main>
    </div>
  </div>`;
  $("#finish").onclick=requestFinish;
    $("#exit").onclick=()=>{saveState();renderStart();};
  $("#reset").onclick=()=>{if(confirm("현재 응시의 답안과 남은 시간이 삭제됩니다. 계속할까요?")){clearState();renderStart();}};
  renderQuestion(); startTimer();
}
function startTimer(){
  if(timerHandle) clearInterval(timerHandle);
  const tick=()=>{
    if(!state||state.status!=="exam") return;
    const rem=getRemaining(), el=$("#timer"); if(el){el.textContent=fmt(rem);if(rem<=300) el.classList.add("warn");}
    if(rem<=0){clearInterval(timerHandle);finishQuiz(true);}
    if(rem%15===0) saveState();
  };
  tick();timerHandle=setInterval(tick,1000);
}
function renderQuestion(){
  const questions=active(); if(!questions.length)return;
  state.currentIndex=Math.max(0,Math.min(state.currentIndex,questions.length-1));
  const q=questions[state.currentIndex], selected=state.answers[q.id], order=state.optionOrder[q.id]||[0,1,2,3,4];
  $("#progress").textContent=`${answeredCount()}/${questions.length}`;
  $("#qnav").innerHTML=questions.map((item,i)=>{
    const answered=state.answers[item.id]!==undefined&&state.answers[item.id]!==null;
    const flag=!!state.flagged[item.id];
    return `<button class="qn ${answered?"answered":""} ${flag?"flagged":""} ${i===state.currentIndex?"current":""}" data-index="${i}">${i+1}</button>`;
  }).join("");
  $("#qnav").querySelectorAll("button").forEach(btn=>btn.onclick=()=>{state.currentIndex=Number(btn.dataset.index);saveState();renderQuestion();});
  const selectedText=selected===undefined?"":q.o[selected];
  $("#question").innerHTML=`
    <div class="qmeta"><span class="badge ${q.difficulty==="상"?"high":q.difficulty==="중"?"mid":"low"}">${q.difficulty} 난이도</span><span class="tag">${esc(q.area)}</span><span class="tag">${esc(q.tag)}</span><span class="qno">${state.currentIndex+1} / ${questions.length}</span></div>
    ${q.p?`<div class="passage">${esc(q.p)}</div><div class="long-note">장문 지문 · 공백 포함 ${String(q.p.length).replace(/\B(?=(\d{3})+(?!\d))/g,",")}자</div>`:""}
    <h2 class="${q.p?"question-prompt":""}">${esc(q.q)}</h2>
    <div class="options">${order.map((original,displayIndex)=>`<label class="option ${selected===original?"selected":""}">
      <input type="radio" name="answer" value="${original}" ${selected===original?"checked":""}>
      <span class="letter">${LETTERS[displayIndex]}</span><span>${esc(q.o[original])}</span>
    </label>`).join("")}</div>
    <div class="tools"><button class="flag ${state.flagged[q.id]?"on":""}" id="flag">${state.flagged[q.id]?"★ 표시 해제":"☆ 문항 표시"}</button><span class="hint">${selectedText?"답안이 저장되었습니다.":"답안을 고르거나 문항을 표시해 두세요."}</span></div>
    <div class="qcontrols"><button class="secondary" id="prev" ${state.currentIndex===0?"disabled":""}>← 이전</button><button class="primary" id="next">${state.currentIndex===questions.length-1?"제출 검토":"다음 →"}</button></div>`;
  $("#question").querySelectorAll("input[name=answer]").forEach(input=>input.onchange=()=>{state.answers[q.id]=Number(input.value);saveState();renderQuestion();});
  $("#flag").onclick=()=>{state.flagged[q.id]=!state.flagged[q.id];saveState();renderQuestion();};
  $("#prev").onclick=()=>{state.currentIndex--;saveState();renderQuestion();};
  $("#next").onclick=()=>{if(state.currentIndex===questions.length-1)requestFinish();else{state.currentIndex++;saveState();renderQuestion();}};
}
function requestFinish(){
  const unanswered=active().filter(q=>state.answers[q.id]===undefined||state.answers[q.id]===null).length;
  const msg=unanswered?`미응답 문항이 ${unanswered}개 있습니다. 지금 제출할까요?`:"모든 문항에 응답했습니다. 제출할까요?";
  if(confirm(msg)) finishQuiz(false);
}
function finishQuiz(timeout=false){
  if(timerHandle) clearInterval(timerHandle);
  const allowed=state.durationMinutes*60;
  state.elapsedSeconds=timeout ? allowed : Math.max(0,Math.min(allowed,allowed-getRemaining()));
  state.status="results";state.finishedAt=new Date().toISOString();state.timeout=timeout;saveState();renderResults();
}
function calc(){
  const qs=active(), byDiff={},byArea={};let correct=0;
  qs.forEach(q=>{
    const ok=state.answers[q.id]===q.a;if(ok)correct++;
    [byDiff,q.difficulty];[byArea,q.area];
    if(!byDiff[q.difficulty])byDiff[q.difficulty]={total:0,correct:0}; if(!byArea[q.area])byArea[q.area]={total:0,correct:0};
    byDiff[q.difficulty].total++;byArea[q.area].total++;if(ok){byDiff[q.difficulty].correct++;byArea[q.area].correct++;}
  });
  return {total:qs.length,correct,wrong:qs.length-correct,rate:Math.round(correct/qs.length*100),byDiff,byArea};
}
function renderResults(){
  if(timerHandle) clearInterval(timerHandle);
  const allowed=state.durationMinutes*60;
  const started=Date.parse(state.startedAt||"");
  const finished=Date.parse(state.finishedAt||"");
  const storedElapsed=Number(state.elapsedSeconds);
  const fallbackElapsed=Number.isFinite(started)&&Number.isFinite(finished)
    ? Math.max(0,Math.min(allowed,Math.floor((finished-started)/1000)))
    : Math.max(0,Math.min(allowed,allowed-getRemaining()));
  const elapsed=Number.isFinite(storedElapsed) ? Math.max(0,Math.min(allowed,storedElapsed)) : fallbackElapsed;
  const data=calc(), hours=Math.floor(elapsed/3600), remSecs=elapsed%3600;
  const durationText=`${String(hours).padStart(2,"0")}:${String(Math.floor(remSecs/60)).padStart(2,"0")}:${String(remSecs%60).padStart(2,"0")}`;
  const diffOrder=["상","중","하"], areaEntries=Object.entries(data.byArea);
  $("#app").innerHTML=`
  <main class="results">
    <section class="result-head">
      <div><div class="eyebrow">모의고사 결과</div><h1>채점 결과</h1><p>${state.timeout?"시간이 종료되어 자동 제출되었습니다.":"응시가 제출되었습니다."} · 경과시간 ${durationText}</p></div>
      <div class="result-actions"><button class="secondary home-button" id="home">처음 화면</button><button class="secondary" id="csv">CSV 저장</button><button class="secondary" id="print">인쇄</button><button class="primary" id="newExam">모의고사 시작</button></div>
    </section>
    <section class="panel score-card"><div class="ring" style="--score:${data.rate}%"><strong>${data.rate}</strong><span>점</span></div>
      <div><h2>${data.correct} / ${data.total} 정답</h2><p>오답·미응답 ${data.wrong}문항 · 60점 이상은 ${data.rate>=60?"달성":"미달"}입니다.</p><p class="muted">난이도별 강약점과 각 문항의 해설·근거를 확인하세요.</p>
      ${data.wrong?'<button class="primary compact" id="retryWrong">오답·미응답 재시험</button>':""}</div></section>
    <section class="summary-grid">${diffOrder.map(d=>summaryCard(`${d} 난이도`,data.byDiff[d]||{total:0,correct:0})).join("")}</section>
    <section class="summary-grid">${areaEntries.map(([label,s])=>summaryCard(label,s)).join("")}</section>
    <section class="panel review"><div class="review-top"><div><h2>문항별 해설</h2><p>선택한 답과 정답, 학습용 해설, 인증기준·법령 근거, 검토유형과 원문 링크를 제공합니다.</p></div>
      <div class="filters"><button class="filter active" data-filter="all">전체</button><button class="filter" data-filter="wrong">오답·미응답</button><button class="filter" data-filter="correct">정답</button><button class="filter" data-filter="상">상</button><button class="filter" data-filter="중">중</button><button class="filter" data-filter="하">하</button></div></div><div id="reviewList" class="review-list"></div></section>
    <section class="panel footnote"><h3>문항 사용 안내</h3><p>본 문제은행은 학습용 신규 문항입니다. 인증기준 101개와 공식 출제범위의 관련 법령·하위규정을 매핑했으나, 법령·고시·공식 안내는 변경될 수 있으므로 실제 시험·심사 업무에는 해당 공고일 기준의 원문을 반드시 확인하세요.</p></section>
  </main>`;
  $("#home").onclick=renderStart;$("#newExam").onclick=()=>{if(confirm("새 모의고사(50문항)를 시작할까요?"))startAttempt(selectNextSet(),DEFAULT_MINUTES,"ISMS-P 모의고사","standard");};
  $("#csv").onclick=downloadCSV;$("#print").onclick=()=>window.print();
  if($("#retryWrong")) $("#retryWrong").onclick=retryWrong;
  $(".filters").querySelectorAll("button").forEach(btn=>btn.onclick=()=>{document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderReview(btn.dataset.filter);});
  renderReview("all");
}
function summaryCard(label,s){const rate=s.total?Math.round(s.correct/s.total*100):0;return `<article class="panel summary"><h3>${esc(label)}</h3><div class="bar"><i style="width:${rate}%"></i></div><p><strong>${s.correct}/${s.total}</strong> 정답 · ${rate}%</p></article>`;}
function renderReview(filter){
  const list=$("#reviewList"), qs=active().filter(q=>{const ok=state.answers[q.id]===q.a;if(filter==="all")return true;if(filter==="wrong")return !ok;if(filter==="correct")return ok;return q.difficulty===filter;});
  if(!qs.length){list.innerHTML='<div class="empty">선택한 조건에 맞는 문항이 없습니다.</div>';return;}
  list.innerHTML=qs.map((q,index)=>{
    const selected=state.answers[q.id],ok=selected===q.a, number=state.questionOrder.indexOf(q.id)+1;
    return `<article class="card ${ok?"correct":"wrong"}"><div class="rmeta"><span>${number}번</span><span>${esc(q.difficulty)} 난이도</span><span>${esc(q.area)}</span><span>${esc(q.tag)}</span><b>${ok?"정답":"오답·미응답"}</b></div>
      <h3>${q.p?`${esc(q.p)}<br><br>`:""}${esc(q.q)}</h3><div class="answers"><div><small>내 답</small><p>${selected===undefined||selected===null?"미응답":esc(q.o[selected])}</p></div><div><small>정답</small><p>${esc(q.o[q.a])}</p></div></div>
      <div class="explain"><b>해설</b><p>${esc(q.e)}</p><span>근거: ${esc(q.b)}</span><br><span class="validation-note">검토: ${esc(q.v)}</span>${q.u?`<br><a href="${esc(q.u)}" target="_blank" rel="noopener">원문 및 공식 자료 확인</a>`:""}</div></article>`;
  }).join("");
}
function retryWrong(){
  const ids=active().filter(q=>state.answers[q.id]!==q.a).map(q=>q.id);
  if(!ids.length)return;
  const mins=Math.max(10,Math.ceil(ids.length*2.4));
  startAttempt(ids,mins,`오답·미응답 재시험 (${ids.length}문항)`,"retry");
}
function downloadCSV(){
  const rows=[["문항번호","난이도","영역","세부 주제","문제","내 답","정답","채점 결과","근거","원문 링크"]];
  active().forEach((q,i)=>{const selected=state.answers[q.id];rows.push([i+1,q.difficulty,q.area,q.tag,q.p?`${q.p}\n\n${q.q}`:q.q,selected===undefined?"미응답":q.o[selected],q.o[q.a],selected===q.a?"정답":"오답",q.b,q.u||""]);});
  const csv="\ufeff"+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=`isms-p-result-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}
document.addEventListener("DOMContentLoaded",()=>{startAccessGate();});
</script>
