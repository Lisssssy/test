<style>
:root{
  --ink:#14252d; --muted:#587079; --line:#d6e3e1; --paper:#f5f9f8; --panel:#ffffff;
  --navy:#143848; --teal:#007d79; --teal-soft:#def2ee; --blue:#206493; --amber:#a85d08;
  --red:#b5484d; --green:#17866e; --shadow:0 18px 50px rgba(28,59,65,.12);
}
*{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--paper);color:var(--ink);
font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;line-height:1.62}
button,input{font:inherit} button{cursor:pointer;border:0} button:disabled{opacity:.5;cursor:not-allowed}
.landing,.results{max-width:1160px;margin:0 auto;padding:54px 28px 80px}.hero{max-width:820px;padding:10px 0 32px}
.eyebrow{font-size:.75rem;font-weight:900;letter-spacing:.12em;color:var(--teal)}
h1{font-size:clamp(2.2rem,5.3vw,4.6rem);line-height:1.05;letter-spacing:-.055em;margin:9px 0 18px}
h1 span{color:var(--teal)} .subtitle{font-size:1.08rem;color:var(--muted);max-width:760px;margin:0}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 0}.chip,.tag,.badge{border-radius:999px;padding:5px 10px;font-size:.81rem;font-weight:800}
.chip{background:var(--teal-soft);color:#005d5b}.tag{background:#eef4f3;color:#35575b}.badge{background:#edf5ff;color:#1e5a81}.badge.high{background:#fff0ec;color:#a34037}.badge.mid{background:#fff7e8;color:#956006}.badge.low{background:#edf8f5;color:#18745f}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.setup{padding:27px;margin-top:8px}.setup h2{margin:0 0 16px;font-size:1.42rem}.setup-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.setup-grid label:not(.check){display:grid;gap:7px;font-weight:800;color:var(--navy)}.setup-grid input[type=number]{border:1px solid #b7cbc8;border-radius:10px;padding:11px;background:white;width:100%}
.check{border:1px solid #dce9e7;border-radius:10px;padding:11px;display:flex;align-items:center;gap:9px;font-weight:800;background:#fbfefd}.check input{width:18px;height:18px;accent-color:var(--teal)}
.spec{margin:20px 0;padding:15px 17px;border-radius:12px;background:#eff7f5;color:#315c5c;display:grid;gap:3px}.spec strong{font-size:.95rem}
.spec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:9px}.spec-grid div{padding:10px 12px;background:#fff;border:1px solid #dceae7;border-radius:10px}.spec-grid b{display:block;color:var(--teal);font-size:1.1rem}.spec-grid span{font-size:.86rem}
.notice{margin:16px 0;padding:13px 15px;border-left:4px solid var(--amber);background:#fff8ed;border-radius:8px;color:#735116}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.primary,.secondary,.danger,.text{border-radius:10px;padding:11px 16px;font-weight:850;transition:.14s transform,.14s background}.primary{background:var(--teal);color:#fff}.primary:hover{background:#006b68;transform:translateY(-1px)}.secondary{background:#fff;color:var(--navy);border:1px solid #b7cbc8}.secondary:hover{background:#eff7f5}.danger{background:var(--red);color:#fff}.text{background:transparent;color:var(--red);padding:8px}.compact{padding:8px 11px;font-size:.87rem}
.info-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:18px;align-items:stretch}.info{padding:22px 24px}.info.sources{grid-column:auto}.info h3{margin:0 0 8px;color:var(--navy)}.info p{margin:0;color:#42636a}.info ul{margin:10px 0 0;padding-left:20px;color:#42636a}.info li{margin:4px 0}.validation strong{font-size:2.3rem;color:var(--teal);display:block;line-height:1}.validation .muted{margin-top:4px;font-size:.88rem;color:var(--muted)}
.exam-shell{min-height:100vh}.topbar{height:76px;background:var(--navy);color:white;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10}.brand{font-size:1.03rem;font-weight:850}.brand small{display:block;color:#a8d9d1;letter-spacing:.11em;font-size:.65rem;margin-bottom:2px}.metrics{display:flex;gap:14px;align-items:center}.metrics #timer{font-size:1.32rem;letter-spacing:.04em;font-variant-numeric:tabular-nums}.metrics #timer.warn{color:#ffd487}.metrics #save{font-size:.83rem;color:#bcd9d6}.exam-controls{background:#e9f7f4!important;color:#0c554f!important;border:1px solid #b9e2da!important;white-space:nowrap}.exam-controls-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none}.exam-controls:hover{background:#d7f0eb!important}
.exam-layout{display:grid;grid-template-columns:296px minmax(0,1fr);max-width:1440px;margin:0 auto}.nav{background:white;border-right:1px solid var(--line);padding:21px 17px;min-height:calc(100vh - 76px);position:sticky;top:76px;height:calc(100vh - 76px);overflow:auto}.nav-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}.nav-title span{color:var(--teal);font-weight:850;font-size:.88rem}.legend{display:flex;flex-wrap:wrap;gap:8px;font-size:.72rem;color:var(--muted);margin-bottom:14px}.lg{display:inline-block;width:9px;height:9px;margin-right:3px;border-radius:3px;background:#f2f6f6;border:1px solid #d3e0de}.lg.answered{background:#aee0d3;border-color:#5fad9a}.lg.flag{background:#ffe3af;border-color:#e1a244}.qnav{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.qn{height:38px;border:1px solid #dce6e5;border-radius:8px;background:#f6f8f8;color:var(--navy);font-size:.83rem;font-weight:850}.qn.answered{background:#dff3ee;border-color:#78c5b3}.qn.flagged{box-shadow:inset 0 -3px 0 #e4a332}.qn.current{outline:3px solid var(--blue);outline-offset:1px}.nav-actions{display:grid;gap:5px;margin-top:21px}.nav-actions .secondary{width:100%}.nav-actions .controls-shortcut{margin-top:8px;width:100%;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}

/* 로컬 파일 접근 게이트: 비밀번호 입력 화면에서만 별빛 배경을 표시 */
body.gate-active{
  background:#050b18 url("nightskylake.png") center/cover no-repeat fixed!important;
}
body.gate-active #app{min-height:100vh}
.access-gate{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  background:linear-gradient(rgba(1,8,21,.34),rgba(1,6,17,.58));
}
.access-gate form{
  display:flex;
  align-items:center;
  gap:8px;
  margin:0;
  padding:12px;
  border:1px solid rgba(255,255,255,.28);
  border-radius:16px;
  background:rgba(8,22,47,.48);
  box-shadow:0 18px 48px rgba(0,0,0,.34);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.access-gate input{
  width:min(300px,62vw);
  height:46px;
  padding:0 13px;
  border:1px solid rgba(255,255,255,.40);
  border-radius:8px;
  background:rgba(255,255,255,.94);
  color:#14252d;
  outline:none;
  font:inherit;
}
.access-gate input:focus{border-color:#a9d4ff;box-shadow:0 0 0 3px rgba(144,198,255,.24)}
.access-gate button{height:46px;padding:0 16px;border-radius:8px;background:#143848;color:#fff;font-weight:800}
.access-gate button:disabled,.access-gate input:disabled{opacity:.62;cursor:not-allowed}
.access-gate-status{
  position:fixed;
  left:50%;
  top:calc(50% + 53px);
  transform:translateX(-50%);
  width:min(410px,84vw);
  margin:0;
  padding:8px 12px;
  border-radius:10px;
  background:rgba(4,10,23,.50);
  color:#ffd7d9;
  text-align:center;
  font-size:.86rem;
  line-height:1.45;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.access-gate-status.locked{color:#ffd7d9;font-weight:800}
@media(max-width:520px){
  body.gate-active{background-attachment:scroll!important}
  .access-gate form{width:min(92vw,420px);flex-direction:column;align-items:stretch}
  .access-gate input,.access-gate button{width:100%}
  .access-gate-status{top:calc(50% + 92px)}
}

<script>
const BANK = [{"id":"C-1.1.1-L1","conceptId":"c-1.1.1-l1","difficulty":"하","area":"관리체계 수립·운영","tag":"1.1.1 경영진의 참여","q":"ISMS-P 인증기준 「1.1.1 경영진의 참여」의 통제목적에 가장 부합하는 운영은?","o":["통제 목적과 무관하게 문서 파일만 보관하고 실제 운영 여부는 확인하지 않는다.","업무 영향과 위험을 고려하지 않고 담당자의 구두 판단만으로 예외를 상시 허용한다.","사고가 발생한 뒤에만 일회성으로 조치하고 정기적인 검토나 기록은 남기지 않는다.","책임자·대상·승인 기준을 정하지 않은 채 동일한 방식만 일률적으로 적용한다.","관리체계의 성과·주요 위험·개선 필요사항을 경영진이 검토하고 필요한 의사결정과 지원을 수행한다."],"a":4,"e":"「1.1.1 경영진의 참여」의 통제목적은 단순 문서 보관이 아니라, 다음과 같은 운영이 실제로 이루어지도록 하는 데 있다: 관리체계의 성과·주요 위험·개선 필요사항을 경영진이 검토하고 필요한 의사결정과 지원을 수행한다.","b":"ISMS-P 인증기준 1.1.1 경영진의 참여 · 세부점검항목의 주요 확인사항","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"공식 인증기준명·세부점검항목의 통제목적 연결 검토","controlCode":"1.1.1"},{"id":"C-1.1.1-L2","conceptId":"c-1.1.1-l2","difficulty":"하","area":"관리체계 수립·운영","tag":"1.1.1 경영진의 참여","q":"「1.1.1 경영진의 참여」의 실제 운영 여부를 확인하는 증적으로 가장 적절한 것은?","o":["마케팅 캠페인 성과표","경영진 검토 회의록, 안건·보고자료, 의사결정·자원지원 이행 기록","사내 행사 참석자 명단","회의실 예약 내역","제품 판매 실적표"],"a":1,"e":"심사에서는 해당 통제의 책임자, 수행 내용, 검토·승인 및 후속조치가 연결되는 증적을 확인한다. 이 항목의 대표 증적은 경영진 검토 회의록, 안건·보고자료, 의사결정·자원지원 이행 기록이다.","b":"ISMS-P 인증기준 1.1.1 경영진의 참여 · 안내서의 증적문서 관점","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"공식 인증기준명·안내서의 증적문서 관점 연결 검토","controlCode":"1.1.1"},{"id":"C-1.1.1-M1","conceptId":"c-1.1.1-m1","difficulty":"중","area":"관리체계 수립·운영","tag":"1.1.1 경영진의 참여","q":"A사는 「1.1.1 경영진의 참여」에 관하여 다음과 같은 미흡사항을 발견했다. “경영진 검토 없이 실무자 판단만으로 위험과 개선사항을 장기간 방치한다.” 심사·개선 관점에서 가장 적절한 조치는?","o":["정기심사 직전에 문서 문구만 수정하고 실제 운영·증적 보완은 다음 연도로 미룬다.","업무가 바쁘다는 이유로 담당자의 경험에 따라 예외를 무기한 적용하고 승인 기록은 남기지 않는다.","미흡사항과 위험을 기록하지 않고 같은 문제가 다시 발생했을 때만 검토한다.","영향 범위와 법적 요구사항을 확인하지 않고 모든 대상에 동일한 조치를 강제한다.","영향받는 업무·자산·개인정보와 잔여위험을 확인한 뒤, 관리체계의 성과·주요 위험·개선 필요사항을 경영진이 검토하고 필요한 의사결정과 지원을 수행한다. 또한 다음과 같은 증적으로 조치·검토 결과를 남긴다: 경영진 검토 회의록, 안건·보고자료, 의사결정·자원지원 이행 기록."],"a":4,"e":"제시된 상태는 「1.1.1 경영진의 참여」의 통제목적과 운영증적이 연결되지 않은 사례다. 단순 문서 보완에 그치지 말고, 다음과 같은 운영을 실제로 수행해야 한다: 영향받는 업무·자산·개인정보와 잔여위험을 확인한 뒤, 관리체계의 성과·주요 위험·개선 필요사항을 경영진이 검토하고 하고 기록한다.","업무 영향과 위험을 고려하지 않고 담당자의 구두 판단만으로 예외를 상시 허용한다.","사고가 발생한 뒤에만 일회성으로 조치하고 정기적인 검토나 기록은 남기지 않는다.","책임자·대상·승인 기준을 정하지 않은 채 동일한 방식만 일률적으로 적용한다."],"a":1,"e":"「3.5.3 정보주체에 대한 통지」의 통제목적은 단순 문서 보관이 아니라, 다음과 같은 운영이 실제로 이루어지도록 하는 데 있다: 법적 의무 대상에 해당하는 경우 개인정보 이용·제공 내역 또는 그 내역을 확인할 수 있는 정보시스템에 접속하는 방법을 정보주체에게 주기적으로 통지하고 기록한다.","b":"ISMS-P 인증기준 3.5.3 정보주체에 대한 통지 · 개인정보 보호법 제20조의2 · 개인정보 보호법 시행령 제15조의3","u":"https://www.law.go.kr/LSW//lsLinkCommonInfo.do?ancYnChk=&chrClsCd=010202&lspttninfSeq=182187","v":"2026년 6월 법령·인증기준 정합성 검토: 이용·제공 내역 통지 의무 중심으로 정밀화","controlCode":"3.5.3"},{"id":"C-3.5.3-L2","conceptId":"c-3.5.3-l2","difficulty":"하","area":"개인정보 처리단계별 요구사항","tag":"3.5.3 정보주체에 대한 통지","q":"「3.5.3 정보주체에 대한 통지」의 실제 운영 여부를 확인하는 증적으로 가장 적절한 것은?","o":["통지 의무 대상 산정 자료, 통지 기준·템플릿, 대상·발송·수신 기록, 예외·오류 조치 기록","제품 출시 일정표","사내 동호회 활동 기록","마케팅 디자인 원본","일반 판매 실적표"],"a":0,"e":"대표 증적은 통지 의무 대상 산정 자료, 통지 기준·템플릿, 대상·발송·수신 기록, 예외·오류 조치 기록이다. 시행령은 통지 사실·시기·방법의 보관을 요구한다.","b":"ISMS-P 인증기준 3.5.3 정보주체에 대한 통지 · 개인정보 보호법 시행령 제15조의3","u":"https://www.law.go.kr/LSW//lsLinkCommonInfo.do?ancYnChk=&chrClsCd=010202&lspttninfSeq=182187","v":"2026년 6월 법령·증적 정합성 검토","controlCode":"3.5.3"},{"id":"C-3.5.3-M1","conceptId":"c-3.5.3-m1","difficulty":"중","area":"개인정보 처리단계별 요구사항","tag":"3.5.3 정보주체에 대한 통지","q":"A사는 「3.5.3 정보주체에 대한 통지」에 관하여 다음과 같은 미흡사항을 발견했다. “개인정보 이용·제공 내역 통지 의무 대상 여부를 산정하지 않고, 통지 주기·항목·기록을 관리하지 않는다.” 심사·개선 관점에서 가장 적절한 조치는?","o":["정기심사 직전에 문서 문구만 수정하고 실제 운영·증적 보완은 다음 연도로 미룬다.","업무가 바쁘다는 이유로 담당자의 경험에 따라 예외를 무기한 적용하고 승인 기록은 남기지 않는다.","미흡사항과 위험을 기록하지 않고 같은 문제가 다시 발생했을 때만 검토한다.","영향 범위와 법적 요구사항을 확인하지 않고 모든 대상에 동일한 조치를 강제한다.","영향받는 개인정보 처리 현황과 법적 의무 대상 여부를 확인한 뒤, 법적 의무 대상에 해당하는 경우 개인정보 이용·제공 내역 또는 그 내역을 확인할 수 있는 정보시스템에 접속하는 방법을 정보주체에게 주기적으로 통지하고 기록한다. 또한 다음과 같은 증적으로 조치·검토 결과를 남긴다: 통지 의무 대상 산정 자료, 통지 기준·템플릿, 대상·발송·수신 기록, 예외·오류 조치 기록."],"a":4,"e":"제시된 상태는 「3.5.3 정보주체에 대한 통지」의 통제목적과 운영증적이 연결되지 않은 사례다. 단순 문서 보완에 그치지 말고, 다음과 같은 운영을 실제로 수행해야 한다: 영향받는 개인정보 처리 현황과 법적 의무 대상 여부를 확인한 뒤, 법적 의무 대상에 해당하는 경우 개인정보 이용·제공 내역 또는 그 내역을 확인할 수 있는 정보시스템에 접속하는 방법을 정보주체에게 주기적으로 통지하고 기록한다. 또한 조치·검토 결과를 뒷받침하는 증적을 남겨야 한다: 통지 의무 대상 산정 자료, 통지 기준·템플릿, 대상·발송·수신 기록, 예외·오류 조치 기록.","b":"ISMS-P 인증기준 3.5.3 정보주체에 대한 통지 · 개인정보 보호법 제20조의2 · 개인정보 보호법 시행령 제15조의3","u":"https://www.law.go.kr/LSW//lsLinkCommonInfo.do?ancYnChk=&chrClsCd=010202&lspttninfSeq=182187","v":"2026년 6월 법령·인증기준 정합성 검토: 이용·제공 내역 통지 의무 중심으로 정밀화","controlCode":"3.5.3"},{"id":"L-01-L1","conceptId":"l-01-l1","difficulty":"하","area":"관련 법령","tag":"관련법령 · 정보통신망 이용촉진 및 정보보호 등에 관한 법률","q":"ISMS-P 인증심사원 자격검정의 공식 「정보보호 관련 법규 범위 상세」에서 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」의 법령군으로 옳은 것은?","o":["공통 인증규정","개인정보보호법 및 하위규정","기반보호법 및 하위규정","클라우드컴퓨팅 발전 및 이용자 보호에 관한 법률","정보통신망법 및 하위규정"],"a":4,"e":"해당 법령은 공식 법규 범위 상세에서 「정보통신망법 및 하위규정」에 포함되어 있다.","b":"ISMS-P 자격검정 출제분야 · 정보보호 관련 법규 범위 상세 · 정보통신망 이용촉진 및 정보보호 등에 관한 법률","u":"https://www.law.go.kr/LSW/unSc.do?query=%EC%A0%95%EB%B3%B4%ED%86%B5%EC%8B%A0%EB%A7%9D%20%EC%9D%B4%EC%9A%A9%EC%B4%89%EC%A7%84%20%EB%B0%8F%20%EC%A0%95%EB%B3%B4%EB%B3%B4%ED%98%B8%20%EB%93%B1%EC%97%90%20%EA%B4%80%ED%95%9C%20%EB%B2%95%EB%A5%A0","v":"공식 출제범위의 법령명·법령군 매핑 검토","lawId":"L-01"},{"id":"L-01-L2","conceptId":"l-01-l2","difficulty":"하","area":"관련 법령","tag":"관련법령 · 정보통신망 이용촉진 및 정보보호 등에 관한 법률","q":"다음 상황에서 적용 여부와 세부요건을 우선 확인할 법령·고시로 가장 적절한 것은? “정보통신망 이용과 정보보호 관련 적용요건”","o":["ISMS-P 인증제도 및 인증기준의 적용","개인정보의 처리와 정보주체 권리·보호조치","개인정보 보호법에서 위임한 세부 적용요건","정보통신망 이용촉진 및 정보보호 등에 관한 법률","개인정보의 관리적·기술적·물리적 안전조치"],"a":3,"e":"제시된 사안은 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」의 적용 대상·세부요건을 우선 확인해야 한다. 실제 판단에는 국가법령정보센터의 해당 시점 현행 원문과 관계 기관 해석을 함께 확인한다.","b":"국가법령정보센터 원문 · 정보통신망 이용촉진 및 정보보호 등에 관한 법률","u":"https://www.law.go.kr/LSW/unSc.do?query=%EC%A0%95%EB%B3%B4%ED%86%B5%EC%8B%A0%EB%A7%9D%20%EC%9D%B4%EC%9A%A9%EC%B4%89%EC%A7%84%20%EB%B0%8F%20%EC%A0%95%EB%B3%B4%EB%B3%B4%ED%98%B8%20%EB%93%B1%EC%97%90%20%EA%B4%80%ED%95%9C%20%EB%B2%95%EB%A5%A0","v":"공식 출제범위의 법령명과 적용 주제의 연결 검토","lawId":"L-01"},{"id":"L-02-L1","conceptId":"l-02-l1","difficulty":"하","area":"관련 법령","tag":"관련법령 · 정보통신 ":"T-IAM-01","conceptId":"t-iam-01","difficulty":"하","area":"정보보호 이론·기술","tag":"이론·기술 · 식별·인증·인가","q":"사용자 인증(Authentication)의 목적은 무엇인가?","o":["사용자에게 필요한 권한을 부여하는 것","업무 데이터의 보유기간을 정하는 것","접속하려는 사용자가 주장하는 신원과 동일한지 확인하는 것","서버의 성능을 측정하는 것","백업본을 보관하는 것"],"a":2,"e":"식별은 누구인지 주장하게 하는 과정, 인증은 그 신원을 확인하는 과정, 인가는 권한을 부여하는 과정이다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 식별·인증·인가","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"IAM-01"},{"id":"T-IAM-02","conceptId":"t-iam-02","difficulty":"하","area":"정보보호 이론·기술","tag":"이론·기술 · 접근통제","q":"최소권한 원칙의 설명으로 가장 적절한 것은?","o":["모든 사용자가 관리자 권한을 갖도록 하는 원칙","권한 검토를 하지 않는 원칙","업무 수행에 필요한 범위로만 권한을 부여하고 불필요한 권한은 제한하는 원칙","공유 계정을 우선 사용하는 원칙","사고 발생 뒤에만 권한을 정리하는 원칙"],"a":2,"e":"최소권한은 접근통제의 핵심 원칙으로, 역할과 업무상 필요 범위에 따라 권한을 제한한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 접근통제","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"IAM-02"},{"id":"T-CRYPTO-01","conceptId":"t-crypto-01","difficulty":"하","area":"정보보호 이론·기술","tag":"이론·기술 · 해시","q":"해시 함수의 보안 활용으로 가장 적절한 것은?","o":["대칭키를 전달하기 위해 평문을 그대로 보내는 데 사용한다.","네트워크를 물리적으로 분리하는 데 사용한다.","계정 권한을 자동 승인하는 데 사용한다.","원문을 직접 복원하기 어렵게 고정 길이의 검증값을 만들어 무결성 확인 등에 활용한다.","서비스 가용성을 높이기 위해 부하를 분산하는 데 사용한다."],"a":3,"e":"해시는 일반적으로 단방향 검증값을 생성해 무결성 검증 및 비밀번호 보호 설계 등에 활용한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 해시","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-01"},{"id":"T-CRYPTO-02","conceptId":"t-crypto-02","difficulty":"하","area":"정보보호 이론·기술","tag":"이론·기술 · 암호화","q":"암호화의 주된 보안 목적은 무엇인가?","o":["서비스의 처리량을 늘리는 것","권한을 자동으로 승인하는 것","취약점을 자동으로 제거하는 것","인가되지 않은 자가 내용을 읽지 못하도록 정보의 기밀성을 보호하는 것","사고 원인을 자동으로 판단하는 것"],"a":3,"e":"암호화는 보호 대상의 기밀성 보호에 활용되며, 키 관리가 함께 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 암호화","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-02"},{"id":"T-INC-01","conceptId":"t-inc-01","difficulty":"하","area":"정보보호 이론·기술","tag":"이론·기술 · 사고대응","q":"침해사고 대응의 초기 활동으로 가장 적절한 것은?","o":["증거를 즉시 삭제해 외부 노출을 줄인다.","원인 파악 없이 모든 시스템을 영구 폐기한다.","사실관계와 영향 범위를 확인하고, 정해진 절차에 따라 보고·기록·초기 대응을 수행한다.","사고 기록을 남기지 않고 구두로만 처리한다.","최종 원인이 확정될 때까지 어떠한 대응도 하지 않는다."],"a":2,"e":"초기 대응은 탐지 사실을 기록하고, 영향 분석·보고·확산 방지·증거보전 등을 절차에 따라 수행하는 것이 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 사고대응","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"INC-01"},{"id":"T-BCP-01","conceptId":"t-bcp-01","difficulty":"하","area":"정보보호 이론·기술","tag":"이론·기술 · 백업·복구","q":"백업의 실효성을 확인하는 방법으로 가장 적절한 것은?","o":["백업 파일만 만들고 복구는 실제 사고 때 처음 시도한다.","백업본을 운영 데이터와 같은 위치에만 보관한다.","백업 접근권한을 모든 임직원에게 부여한다.","백업본의 존재뿐 아니라 복구 절차와 복구 가능성을 정기적으로 시험·검증한다.","백업 결과를 기록하지 않는다."],"a":3,"e":"백업은 생성 여부만으로 충분하지 않으며, 복구 가능성·보관·보호·시험을 함께 관리해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 백업·복구","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"BCP-01"},{"id":"T-SEC-01","conceptId":"t-sec-01","difficulty":"하","area":"정보보호 이론·기술","tag":"이론·기술 · 보안통제","q":"예방적 통제의 예로 가장 적절한 것은?","o":["사고 후 원인을 분석하는 사후 검토","로그를 보고 이상행위를 발견하는 모니터링","손상된 데이터를 복구하는 복구 절차","사고 후 재발방지를 위한 개선 활동","비인가 접근을 막기 위한 접근권한 부여·인증 통제"],"a":4,"e":"예방적 통제는 사고나 위반이 발생하기 전에 위험을 줄이는 통제다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 보안통제","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"SEC-01"},{"id":"T-NET-01","conceptId":"t-net-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 네트워크 분리","q":"네트워크 분리의 주된 목적으로 가장 적절한 것은?","o":["모든 시스템을 하나의 네트워크에 두어 운영을 단순화하는 것","모든 포트를 상시 개방해 연결성을 높이는 것","로그 수집을 중단해 성능을 높이는 것","관리자 계정을 여러 명이 공유하게 하는 것","업무·보안등급·위험이 다른 구간 사이의 불필요한 통신을 제한해 침해 확산과 비인가 접근을 줄이는 것"],"a":4,"e":"네트워크 분리는 자산과 서비스의 중요도·연계 필요성을 고려해 통신 경로를 제한하고 통제하는 방식이다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 네트워크 분리","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-01"},{"id":"T-NET-02","conceptId":"t-net-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 방화벽","q":"방화벽 정책 운영 시 가장 적절한 원칙은?","o":["서비스 편의를 위해 모든 인바운드 통신을 허용한다.","정책 변경은 기록하지 않는다.","필요한 통신만 명시적으로 허용하고 나머지는 제한하며 변경·검토 이력을 관리한다.","테스트 규칙을 운영환경에 영구 유지한다.","관리자 개인 판단만으로 예외를 준다."],"a":2,"e":"방화벽은 최소 허용 원칙과 변경·검토·로그 관리가 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 방화벽","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-02"},{"id":"T-NET-03","conceptId":"t-net-03","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · WAF","q":"웹 애플리케이션 방화벽(WAF)의 활용으로 가장 적절한 것은?","o":["데이터베이스 백업을 수행하는 통제","사용자 비밀번호를 생성하는 통제","물리적 출입을 통제하는 통제","개인정보 보유기간을 자동 결정하는 통제","웹 요청을 분석해 알려진 웹 공격 패턴과 비정상 요청을 탐지·차단하는 보조 통제"],"a":4,"e":"WAF는 웹 공격 방어에 유용하지만 안전한 개발과 취약점 조치를 대체하지는 않는다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · WAF","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-03"},{"id":"T-NET-04","conceptId":"t-net-04","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · IDS·IPS","q":"침입방지시스템(IPS)의 설명으로 가장 적절한 것은?","o":["이상행위를 기록만 하고 차단 기능은 전혀 없는 통제","문서를 암호화하는 통제","백업을 자동 복구하는 통제","물리적 잠금장치를 제어하는 통제","네트워크 트래픽을 분석해 탐지된 위협을 차단하도록 동작할 수 있는 통제"],"a":4,"e":"IDS는 주로 탐지·경보에, IPS는 탐지 후 차단 기능까지 제공할 수 있다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · IDS·IPS","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-04"},{"id":"T-NET-05","conceptId":"t-net-05","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · SIEM","q":"SIEM의 주요 활용으로 가장 적절한 것은?","o":["개별 사용자의 비밀번호를 대신 입력하는 것","서버 하드웨어를 물리적으로 교체하는 것","여러 보안 로그와 이벤트를 수집·상관분석해 이상징후 탐지와 조사에 활용하는 것","백업 파일의 보유기간만 관리하는 것","개인정보 동의를 자동으로 수집하는 것"],"a":2,"e":"SIEM은 다양한 로그를 통합·분석해 탐지와 조사 효율을 높이는 데 활용된다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · SIEM","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-05"},{"id":"T-NET-06","conceptId":"t-net-06","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · EDR","q":"EDR의 설명으로 가장 적절한 것은?","o":["네트워크 대역폭을 늘리는 기술","단말의 행위와 이벤트를 수집·분석해 위협 탐지·조사·대응을 지원하는 보안 기술","문서의 보유기간을 설정하는 기술","출입문을 제어하는 기술","인증서를 발급하는 기술"],"a":1,"e":"EDR은 엔드포인트에서 발생하는 행위 데이터를 기반으로 위협 탐지·대응을 지원한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · EDR","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-06"},{"id":"T-NET-07","conceptId":"t-net-07","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · DLP","q":"DLP의 주된 목적은 무엇인가?","o":["서버의 CPU 사용률을 낮추는 것","웹 페이지 디자인을 변경하는 것","사용자 계정을 자동 생성하는 것","민감정보가 승인되지 않은 경로로 외부 유출되는 것을 탐지·차단하거나 통제하는 것","화재를 감지하는 것"],"a":3,"e":"DLP는 보호대상 정보를 식별하고, 전송·반출 등 유출 경로를 통제하는 데 활용된다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · DLP","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-07"},{"id":"T-NET-08","conceptId":"t-net-08","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · VPN","q":"VPN 사용 시에도 추가 인증과 접근통제가 필요한 이유로 가장 적절한 것은?","o":["VPN은 항상 공개망보다 느리기 때문이다.","VPN은 로그를 전혀 남기지 않기 때문이다.","암호화된 연결만으로 사용자의 신원·권한·접속 적정성이 자동 보장되지는 않기 때문이다.","VPN은 백업을 대신하기 때문이다.","VPN은 악성코드 방지를 자동으로 보장하기 때문이다."],"a":2,"e":"VPN은 전송 경로 보호에 도움을 주지만, 사용자 인증·권한·단말 보안·접속기록 관리가 함께 필요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · VPN","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"NET-08"},{"id":"T-CRYPTO-03","conceptId":"t-crypto-03","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · TLS","q":"TLS의 활용으로 가장 적절한 것은?","o":["데이터를 영구 보관하는 것","클라이언트와 서버 간 통신 구간에서 기밀성과 무결성 보호를 지원하는 것","권한 검토를 수행하는 것","물리적 출입을 통제하는 것","백업 복구를 자동화하는 것"],"a":1,"e":"TLS는 통신 구간 보호에 활용되며 인증서 검증과 안전한 설정이 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · TLS","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-03"},{"id":"T-CRYPTO-04","conceptId":"t-crypto-04","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · PKI","q":"공개키 기반구조(PKI)의 역할로 가장 적절한 것은?","o":["네트워크 대역폭을 자동 확장하는 것","백업 저장공간을 암호화 없이 늘리는 것","계정 권한을 무제한 부여하는 것","공개키와 신원 정보를 연결한 인증서를 통해 통신 상대의 신뢰 검증을 지원하는 것","개인정보 보유기간을 정하는 것"],"a":3,"e":"PKI는 인증서와 공개키를 통해 신원 검증과 안전한 통신을 지원한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · PKI","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-04"},{"id":"T-CRYPTO-05","conceptId":"t-crypto-05","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 대칭·비대칭키","q":"대칭키 암호방식의 일반적 특징으로 가장 적절한 것은?","o":["암호화와 복호화에 동일하거나 밀접하게 관련된 비밀키를 사용한다.","암호화에 공개키, 복호화에 누구나 아는 키를 사용한다.","키가 전혀 필요하지 않다.","무결성 검증만 가능하고 기밀성 보호에는 사용할 수 없다.","네트워크 분리에만 사용한다."],"a":0,"e":"대칭키 방식은 동일 비밀키를 안전하게 공유·보호하는 키 관리가 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 대칭·비대칭키","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-05"},{"id":"T-CRYPTO-06","conceptId":"t-crypto-06","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · HMAC","q":"HMAC의 활용으로 가장 적절한 것은?","o":["파일을 물리적으로 삭제하는 것","방화벽 규칙을 자동 생성하는 것","데이터를 가명처리하는 것","비밀키와 해시 함수를 결합해 메시지의 무결성과 인증 확인에 활용하는 것","사용자 권한을 분리하는 것"],"a":3,"e":"HMAC은 비밀키를 사용하는 메시지 인증 코드로, 위변조 탐지와 송신자 인증에 활용될 수 있다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · HMAC","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-06"},{"id":"T-CRYPTO-07","conceptId":"t-crypto-07","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 솔트","q":"비밀번호 저장 시 솔트(salt)를 사용하는 주된 이유로 가장 적절한 것은?","o":["비밀번호를 평문으로 복원하기 위해서","같은 비밀번호라도 저장 결과가 동일하게 나타나는 것을 줄이고 사전 계산 공격의 효율을 낮추기 위해서","키 길이를 자동으로 줄이기 위해서","로그를 삭제하기 위해서","서버 성능을 낮추기 위해서"],"a":1,"e":"솔트는 비밀번호 해시 과정에 추가되는 값으로, 동일 비밀번호의 반복 해시 문제와 사전 계산 공격을 완화하는 데 도움을 준다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 솔트","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-07"},{"id":"T-CRYPTO-08","conceptId":"t-crypto-08","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 키 관리","q":"암호키 관리에서 가장 적절한 조치는?","o":["암호문과 키를 동일한 공개 저장소에 둔다.","키의 생성·보관·사용·교체·폐기와 접근권한을 분리·기록해 통제한다.","키를 모든 개발자에게 공유한다.","키 교체·폐기 이력을 남기지 않는다.","키를 코드에 평문으로 고정한다."],"a":1,"e":"암호화의 효과는 키 관리에 크게 좌우되므로, 키 접근권한·수명주기·분리보관이 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 키 관리","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CRYPTO-08"},{"id":"T-APP-01","conceptId":"t-app-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · SQL 인젝션","q":"SQL 인젝션 위험을 줄이는 방법으로 가장 적절한 것은?","o":["사용자 입력을 검증하고 파라미터 바인딩 등 안전한 질의 방식을 사용한다.","사용자 입력을 그대로 SQL 문자열에 연결한다.","오류 메시지에 데이터베이스 구조를 모두 노출한다.","관리자 계정을 애플리케이션에 공유한다.","테스트 없이 운영 DB에서 직접 수정한다."],"a":0,"e":"SQL 인젝션은 입력값이 질의 구조를 변경하지 않도록 파라미터화·검증·최소권한 등을 적용해 줄일 수 있다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · SQL 인젝션","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"APP-01"},{"id":"T-APP-02","conceptId":"t-app-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · XSS","q":"교차 사이트 스크립팅(XSS) 위험을 줄이는 방법으로 가장 적절한 것은?","o":["입력값을 검증 없이 그대로 HTML에 출력한다.","세션 식별자를 URL에 항상 노출한다.","모든 스크립트를 외부에서 무제한 로드한다.","로그를 수집하지 않는다.","출력 위치에 맞는 인코딩과 입력 검증을 적용하고 안전한 브라우저 보안정책을 함께 고려한다."],"a":4,"e":"XSS는 신뢰할 수 없는 데이터가 브라우저에서 스크립트로 해석되지 않도록 출력 인코딩과 입력 처리 등을 통해 완화한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · XSS","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"APP-02"},{"id":"T-APP-03","conceptId":"t-app-03","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · CSRF","q":"CSRF 방어로 가장 적절한 것은?","o":["GET 요청에 모든 상태 변경 기능을 둔다.","인증된 사용자의 요청은 검증 없이 처리한다.","중요 요청에 예측하기 어려운 요청 검증값을 사용하고 세션·쿠키 정책을 적절히 설정한다.","모든 요청을 외부 사이트에서 허용한다.","변경 요청의 로그를 남기지 않는다."],"a":2,"e":"CSRF는 사용자가 인증된 상태를 악용한 요청을 막기 위해 요청 출처·토큰·쿠키 설정 등을 고려한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · CSRF","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 .or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"APP-07"},{"id":"T-OPS-01","conceptId":"t-ops-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 변경관리","q":"변경관리에서 보안영향 검토가 필요한 이유로 가장 적절한 것은?","o":["변경은 항상 보안을 강화하므로 검토가 필요 없기 때문이다.","변경기록은 비용만 발생시키기 때문이다.","운영환경에서는 시험이 불가능하기 때문이다.","구성·기능·연계 변경이 새로운 취약점, 권한 오류, 서비스 중단 위험을 만들 수 있기 때문이다.","승인은 개발 속도를 늦추기만 하기 때문이다."],"a":3,"e":"변경은 보안·개인정보·가용성에 영향을 줄 수 있으므로 영향평가·승인·시험·기록·사후검토가 필요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 변경관리","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"OPS-01"},{"id":"T-OPS-02","conceptId":"t-ops-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 패치관리","q":"중요 취약점 패치의 우선순위를 정할 때 가장 적절한 고려요소는?","o":["악용 가능성, 자산 중요도, 노출도, 영향도, 보완통제와 적용 가능성","패치 파일의 이름 길이","개발자 개인 선호도","서버 구입 연도만","마케팅 일정만"],"a":0,"e":"패치 우선순위는 기술적 심각도뿐 아니라 자산·업무 영향과 노출도, 보완통제를 함께 고려해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 패치관리","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"OPS-02"},{"id":"T-OPS-03","conceptId":"t-ops-03","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 로그관리","q":"로그 관리에서 위변조 방지와 접근통제가 필요한 이유로 가장 적절한 것은?","o":["로그 파일의 용량을 무조건 늘리기 위해서","사용자 권한을 자동으로 부여하기 위해서","백업을 대신하기 위해서","개인정보 동의를 수집하기 위해서","사고 분석·책임추적에 사용되는 기록의 신뢰성과 기밀성을 보장하기 위해서"],"a":4,"e":"로그는 사고 분석과 증적에 활용되므로 수집 대상·보관·접근권한·무결성·점검을 관리해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 로그관리","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"OPS-03"},{"id":"T-OPS-04","conceptId":"t-ops-04","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 시간동기화","q":"시스템 시간 동기화가 중요한 이유로 가장 적절한 것은?","o":["사용자 비밀번호를 자동 변경하기 위해서","여러 시스템의 로그 시간 순서를 일관되게 해 사고 분석과 상관분석의 신뢰성을 높이기 위해서","데이터를 암호화하기 위해서","네트워크를 물리적으로 분리하기 위해서","파일을 영구 보관하기 위해서"],"a":1,"e":"시간이 불일치하면 사건 순서와 상관관계 분석이 왜곡될 수 있다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 시간동기화","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"OPS-04"},{"id":"T-OPS-05","conceptId":"t-ops-05","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · RTO·RPO","q":"RPO의 설명으로 가장 적절한 것은?","o":["서비스를 복구하는 데 허용되는 최대 시간만을 뜻한다.","암호키의 길이를 뜻한다.","사용자 권한의 수를 뜻한다.","로그 보관장소를 뜻한다.","장애·재해 시 허용할 수 있는 데이터 손실의 최대 시점 또는 범위와 관련된 목표"],"a":4,"e":"RPO는 데이터 손실 허용 범위, RTO는 서비스 복구에 허용되는 시간을 의미한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · RTO·RPO","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"OPS-05"},{"id":"T-OPS-06","conceptId":"t-ops-06","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 재해복구","q":"재해복구계획의 실효성을 검증하는 방법으로 가장 적절한 것은?","o":["계획서만 작성하고 실제 시험은 하지 않는다.","재해 발생 후에만 역할을 정한다.","복구 절차를 담당자 개인 기억에만 의존한다.","백업본 위치를 기록하지 않는다.","복구 절차·역할·연락체계·복구목표를 포함한 모의훈련과 결과 개선을 수행한다."],"a":4,"e":"DR 계획은 실제로 복구할 수 있는지 훈련·시험하고 문제점을 개선해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 재해복구","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"OPS-06"},{"id":"T-MAL-01","conceptId":"t-mal-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 랜섬웨어","q":"랜섬웨어 피해 확산을 줄이기 위한 대응으로 가장 적절한 것은?","o":["감염 사실을 숨기고 로그를 삭제한다.","관리자 계정을 더 많이 공유한다.","백업본도 같은 네트워크에 연결한 채 암호화된다.","복구 가능성 확인 없이 즉시 몸값을 지급한다.","의심 단말을 신속히 격리하고, 증거·영향을 확인하며, 복구·통지·재발방지 절차를 수행한다."],"a":4,"e":"랜섬웨어 대응은 격리·분석·증거보전·복구·보고와 재발방지의 체계가 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 랜섬웨어","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"MAL-01"},{"id":"T-MAL-02","conceptId":"t-mal-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 피싱","q":"피싱 공격 대응으로 가장 적절한 것은?","o":["의심 메일을 동료에게 재전송해 확인을 받는다.","모든 외부 메일을 자동으로 신뢰한다.","로그를 삭제해 혼란을 줄인다.","계정 공유를 허용한다.","의심 메일·링크·첨부파일을 신고하고, 계정 탈취 가능성을 확인해 비밀번호·세션·접속기록 등을 점검한다."],"a":4,"e":"피싱 대응은 신속한 신고, 계정·세션 보호, 악성 행위 분석과 교육 개선을 포함한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 피싱","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"MAL-02"},{"id":"T-END-01","conceptId":"t-end-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 단말 암호화","q":"분실 위험이 있는 업무용 노트북의 보호조치로 가장 적절한 것은?","o":["분실 시를 대비해 모든 비밀번호를 장비에 메모해 둔다.","단말 보안 설정을 사용자가 임의로 해제하도록 둔다.","관리자 권한을 모든 사용자에게 부여한다.","분실 사실을 기록하지 않는다.","디스크 암호화, 화면 잠금, 자산관리, 원격 삭제 또는 계정차단 등 위험에 맞는 통제를 적용한다."],"a":4,"e":"업무용 단말은 분실·도난·악성코드·미패치 위험을 고려해 자산·설정·암호화·대응체계를 관리해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 단말 암호화","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"END-01"},{"id":"T-END-02","conceptId":"t-end-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · MDM","q":"모바일 기기 관리(MDM)의 활용으로 가장 적절한 것은?","o":["모든 개인 데이터를 무단으로 수집하는 것","방화벽 규칙을 대체하는 것","백업을 자동으로 검증하는 것","업무용 모바일 기기의 보안 설정, 앱·계정·분실대응 등을 중앙에서 관리하는 것","법령상 동의를 면제하는 것"],"a":3,"e":"MDM은 조직 정책에 따라 모바일 단말의 보안 구성과 접근을 관리하는 데 활용된다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · MDM","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"END-02"},{"id":"T-DATA-01","conceptId":"t-data-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 데이터 마스킹","q":"테스트 환경에서 개인정보 노출을 줄이는 방법으로 가장 적절한 것은?","o":["운영 DB 전체를 그대로 개발자에게 제공한다.","업무 목적에 맞는 최소 데이터만 사용하고 마스킹·가명처리·접근통제를 적용한다.","테스트 종료 후 데이터를 무기한 보관한다.","테스트 계정을 공유한다.","테스트 환경을 운영환경과 동일하게 개방한다."],"a":1,"e":"시험 데이터는 운영 개인정보가 불필요하게 노출되지 않도록 최소화·변환·분리·접근통제를 적용해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 데이터 마스킹","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"DATA-01"},{"id":"T-DATA-02","conceptId":"t-data-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 가명처리","q":"가명처리의 설명으로 가장 적절한 것은?","o":["개인정보를 완전히 복구 불가능하게 파기하는 것","개인정보를 모든 사람에게 공개하는 것","암호키를 공유하는 것","로그를 삭제하는 것","추가정보 없이는 특정 개인을 알아볼 수 없도록 개인정보 일부를 대체·삭제하는 등 처리하는 것"],"a":4,"e":"가명정보는 적절한 추가정보 관리와 재식별 금지 등 관련 요건을 함께 고려해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 가명처리","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"DATA-02"},{"id":"T-DATA-03","conceptId":"t-data-03","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 토큰화","q":"토큰화(Tokenization)의 일반적 활용으로 가장 적절한 것은?","o":["민감한 원본 값을 대체 식별값으로 바꾸고 원본과의 대응정보를 별도로 보호하는 것","네트워크를 물리적으로 분리하는 것","악성코드를 자동 삭제하는 것","사용자 권한을 무제한 부여하는 것","서비스를 복구하는 것"],"a":0,"e":"토큰화는 원본 값의 직접 노출을 줄이기 위해 대체값을 사용하고 대응정보를 통제하는 방식이다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 토큰화","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"DATA-03"},{"id":"T-CLOUD-01","conceptId":"t-cloud-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 클라우드 책임분담","q":"클라우드 환경에서 책임분담을 확인해야 하는 이유로 가장 적절한 것은?","o":["클라우드에서는 이용자의 보안책임이 항상 사라지기 때문이다.","제공자는 모든 고객의 권한을 관리하지 않아도 되기 때문이다.","로그 관리가 필요 없기 때문이다.","계약 조건은 보안과 무관하기 때문이다.","서비스 모델과 계약에 따라 제공자와 이용자의 보안책임 범위가 달라질 수 있기 때문이다."],"a":4,"e":"클라우드 보안은 자산·구성·계정·데이터·감사·종료 등에서 제공자와 이용자의 책임을 명확히 해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 클라우드 책임분담","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"CLOUD-01"},{"id":"T-IAM-03","conceptId":"t-iam-03","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · PAM","q":"특권접근관리(PAM)의 목적으로 가장 적절한 것은?","o":["모든 사용자에게 관리자 권한을 부여하는 것","관리자 등 고위험 권한의 발급·사용·기록·승인·회수를 강화하는 것","비밀번호를 평문으로 공유하는 것","로그를 수집하지 않는 것","백업을 폐기하는 것"],"a":1,"e":"PAM은 특권 계정의 오남용과 탈취 위험을 줄이기 위해 승인·분리·기록·점검을 강화한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · PAM","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"IAM-03"},{"id":"T-IAM-04","conceptId":"t-iam-04","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 제로트러스트","q":"제로트러스트 접근의 핵심 원칙으로 가장 적절한 것은?","o":["내부망 사용자는 항상 무조건 신뢰하는 것","네트워크 위치만 신뢰하지 않고 사용자·기기·상황·자원별로 지속적으로 검증하는 것","한 번 인증하면 영구적으로 모든 권한을 주는 것","로그를 남기지 않는 것","모든 시스템을 공개하는 것"],"a":1,"e":"제로트러스트는 명시적 검증·최소권한·침해 가정을 바탕으로 접근을 통제하는 접근법이다.","b":" 보호 이론 및 기술 · 물리보안","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PHYS-01"},{"id":"T-PHYS-02","conceptId":"t-phys-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 환경보호","q":"전산실 환경위협에 대비한 조치로 가장 적절한 것은?","o":["환경 모니터링을 하지 않는다.","장애 발생 뒤에만 설비 상태를 확인한다.","화재·침수·정전·온습도 등 위험에 맞는 보호설비를 운영·점검하고 대응절차를 관리한다.","보호설비 점검 기록을 남기지 않는다.","전원 이중화나 비상 대응을 고려하지 않는다."],"a":2,"e":"중요 시설은 환경위협으로 인한 서비스 중단과 자산 손상을 줄이도록 보호설비·점검·대응체계를 관리한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 환경보호","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PHYS-02"},{"id":"T-PRIV-01","conceptId":"t-priv-01","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 개인정보 최소수집","q":"개인정보 최소수집 원칙에 가장 부합하는 조치는?","o":["서비스 목적 달성에 필요한 항목을 구분하고, 선택정보와 필수정보를 명확히 하며 불필요한 수집을 줄인다.","향후 활용 가능성을 이유로 모든 정보를 미리 수집한다.","선택항목을 필수로 표시한다.","수집 목적을 고지하지 않는다.","보유기간을 정하지 않는다."],"a":0,"e":"개인정보 수집은 목적·필요성·법적 근거를 확인하고 필요 최소한으로 제한하는 것이 중요하다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 개인정보 최소수집","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PRIV-01"},{"id":"T-PRIV-02","conceptId":"t-priv-02","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 목적 외 이용","q":"개인정보의 목적 외 이용·제공 요청을 받았을 때 가장 적절한 조치는?","o":["요청 기관이 있으면 항상 제공한다.","당초 목적, 법적 근거, 예외 요건, 필요한 절차와 기록을 확인한 뒤 제한적으로 처리한다.","기록 없이 담당자가 구두 승인한다.","수집 목적과 무관하게 마케팅에 활용한다.","정보주체 권리를 고려하지 않는다."],"a":1,"e":"목적 외 이용·제공은 예외적 처리이므로 적용 근거와 절차, 기록을 검토해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 목적 외 이용","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PRIV-02"},{"id":"T-PRIV-03","conceptId":"t-priv-03","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 개인정보 파기","q":"보유기간이 종료된 개인정보의 처리로 가장 적절한 것은?","o":["편의를 위해 무기한 보관한다.","삭제 표시만 하고 실제 데이터는 유지한다.","법령상 보존근거 등 예외를 확인하고, 보유 필요가 없으면 복구되지 않도록 안전하게 파기한다.","제3자에게 자유롭게 제공한다.","파기 결과를 확인하지 않는다."],"a":2,"e":"처리 목적 달성·보유기간 경과 시 개인정보는 안전하게 파기하고, 예외 보유 시 근거와 분리 조치를 관리해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 개인정보 파기","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PRIV-03"},{"id":"T-PRIV-04","conceptId":"t-priv-04","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 권리보장","q":"정보주체가 개인정보 열람·정정·삭제를 요청한 경우 가장 적절한 조치는?","o":["요청을 기록 없이 무시한다.","다른 사람에게 요청 내용을 공개한다.","권리행사 창구를 제공하지 않는다.","본인확인과 적용 요건을 검토하고, 정해진 절차에 따라 처리 결과를 통지·기록한다.","요청이 많으면 모두 자동 거부한다."],"a":3,"e":"정보주체 권리행사는 절차·본인확인·기한·결과 통지와 함께 관리되어야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 권리보장","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PRIV-04"},{"id":"T-PRIV-05","conceptId":"t-priv-05","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 개인정보 유출","q":"개인정보 유출 의심 사고가 발생했을 때 가장 적절한 초기 조치는?","o":["사고 사실을 숨기기 위해 로그를 삭제한다.","유출 여부·규모·항목·영향을 확인하고, 확산 방지·증거보전·보고·통지·신고 요건을 절차에 따라 검토한다.","원인이 확정될 때까지 아무 조치를 하지 않는다.","모든 정보를 외부에 즉시 공개한다.","담당자 개인이 기록 없이 처리한다."],"a":1,"e":"개인정보 유출 대응은 사실 확인과 피해 확산 방지, 법적 보고·통지 요건 검토, 재발방지의 체계를 요구한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 개인정보 유출","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PRIV-05"},{"id":"T-PRIV-06","conceptId":"t-priv-06","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 처리위탁","q":"개인정보 처리 업무를 외부에 위탁할 때 가장 적절한 조치는?","o":["위탁 범위·보호조치·재위탁·감독·반환·파기 등을 계약과 운영점검에 반영한다.","수탁자의 접근자를 전혀 관리하지 않는다.","계약 종료 후 데이터 반환·파기 조건을 두지 않는다.","재위탁을 무제한 허용한다.","수탁자 보안 이행을 점검하지 않는다."],"a":0,"e":"처리위탁은 계약·접근권한·보호조치·감독·계약 종료 시 조치를 통합해 관리해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 처리위탁","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PRIV-06"},{"id":"T-PRIV-07","conceptId":"t-priv-07","difficulty":"중","area":"정보보호 이론·기술","tag":"이론·기술 · 국외이전","q":"개인정보 국외이전이 수반되는 서비스를 검토할 때 가장 적절한 조치는?","o":["이전 유형·수령자·이전 국가·목적·항목·보유기간·안전조치와 적용 요건을 확인하고 기록한다.","국외 이전 여부를 처리방침과 관계없이 숨긴다.","수령자와 이전 국가를 확인하지 않는다.","안전조치 검토 없이 즉시 전송한다.","국외이전은 개인정보와 무관하다고 본다."],"a":0,"e":"국외이전은 이전 구조와 적용 요건, 정보주체 보호조치, 계약·기록을 함께 검토해야 한다.","b":"ISMS-P 자격검정 출제분야 · (개인)정보보호 이론 및 기술 · 국외이전","u":"https://isms-p.or.kr/qlfc/base/selectQlfcRngDetail.do","v":"인증기준 관련 기초 정보보호 이론 정의 검토","techCode":"PRIV-07"},{"id":"H-01","conceptId":"long-01-1.1.4","difficulty":"상","area":"관리체계 수립·운영","tag":"1.1.4 범위 설정 · 장문 사례형","q":"위 상황에서 「1.1.4 범위 설정」 관점의 조치로 가장 적절한 것은?","p":"A사는 온라인 예약·결제 서비스와 오프라인 고객센터를 함께 운영한다. 본사 시스템은 사내 전산실과 클라우드 환경에 분산되어 있고, 콜센터와 문자발송 서비스는 별도 사업자가 운영한다.\n\n인증 준비팀은 비용을 줄이기 위해 본사 웹서비스와 운영 DB만 관리체계 범위에 포함하고, 외부 콜센터·문자발송 연계·재해복구용 계정은 “외부 서비스”라는 이유로 범위에서 제외하려고 했다. 그러나 고객 예약 변경 요청은 콜센터에서 처리된 뒤 API를 통해 운영 DB에 반영되고, 문자발송 사업자는 예약자 연락처와 알림 이력을 보관한다.\n\n점검 결과 범위 정의서에는 서비스 경계, 네트워크 구간, 개인정보 흐름, 외부 연계, 적용 제외 사유와 승인자가 충분히 기록되어 있지 않았다. 장애가 발생했을 때 어떤 사업자가 어떤 로그와 개인정보를 보유하는지도 부서마다 설명이 달랐다.\n\n사업부는 “외부 업체는 계약으로만 관리하면 되므로 심사 범위와 무관하다”고 주장했다. 보안총괄책임자는 범위를 지나치게 좁게 잡으면 위험평가와 보호대책 적용 대상이 누락될 수 있다고 지적했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「1.1.4 범위 설정」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","업무·서비스·정보자산·물리·기술적 경계와 외부 연계, 개인정보 흐름을 다시 식별하고, 적용 제외가 필요한 경우에는 사유·영향·대체통제·승인을 기록한 범위 정의서를 갱신한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「1.1.4 범위 설정」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 업무·서비스·정보자산·물리·기술적 경계와 외부 연계, 개인정보 흐름을 다시 식별하고, 적용 제외가 필요한 경우에는 사유·영향·대체통제·승인을 기록한 범위 정의서를 갱신한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 1.1.4 범위 설정 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 932자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"1.1.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-02","conceptId":"long-02-1.2.1","difficulty":"상","area":"관리체계 수립·운영","tag":"1.2.1 정보자산 식별 · 장문 사례형","q":"위 상황에서 「1.2.1 정보자산 식별」 관점의 조치로 가장 적절한 것은?","p":"B사는 여러 부서가 독립적으로 SaaS 도구와 클라우드 저장소를 도입해 사용하는 콘텐츠 플랫폼 기업이다. 마케팅 부서는 설문 도구로 이용자 의견을 수집하고, 개발 부서는 오류 분석 도구에 서비스 로그를 전송한다.\n\n신규 개인정보처리 시스템 점검 과정에서 보안팀은 일부 SaaS 계정이 개인 명의로 생성되어 있고, 계약 담당자·자산 소유자·처리 목적이 자산대장에 등록되지 않았다는 사실을 발견했다. 오류 분석 로그에는 계정 식별자와 IP 주소가 포함될 수 있었지만, 해당 데이터의 중요도와 보존 정책은 정의되어 있지 않았다.\n\n각 부서는 “비용이 적고 운영 서버가 아니므로 자산관리 대상이 아니다”라고 설명했다. 그러나 계약 종료나 계정 퇴직 시 누가 데이터를 회수·삭제해야 하는지, 보안 설정을 누가 검토해야 하는지를 확인할 수 없었다.\n\n경영진은 도구 사용을 즉시 중단하면 개발 일정이 지연될 수 있으므로, 실제 위험이 높은 대상부터 정리하라는 지시를 내렸다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「1.2.1 정보자산 식별」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","SaaS·클라우드 계정·로그 저장소를 포함한 관리 대상 자산을 식별하고, 각 자산의 소유자·처리 목적·중요도·보안등급·위치·계약 상태를 자산대장에 반영한 뒤 미등록 자산의 사용 조건을 통제한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「1.2.1 정보자산 식별」에서는 단순한 문서 보관이나 일회성 조치가 아니라, SaaS·클라우드 계정·로그 저장소를 포함한 관리 대상 자산을 식별하고, 각 자산의 소유자·처리 목적·중요도·보안등급·위치·계약 상태를 자산대장에 반영한 뒤 미등록 자산의 사용 조건을 통제한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 1.2.1 정보자산 식별 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 1,038자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"1.2.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-03","conceptId":"long-03-1.2.2","difficulty":"상","area":"관리체계 수립·운영","tag":"1.2.2 현황 및 흐름분석 · 장문 사례형","q":"위 상황에서 「1.2.2 현황 및 흐름분석」 관점의 조치로 가장 적절한 것은?","p":"C사는 모바일 앱, 웹사이트, 상담센터, 배송업체 연계 시스템을 통해 주문을 처리한다. 이용자는 앱에서 주문하면 결제대행사와 배송업체로 필요한 정보가 전송되고, 상담센터는 주문 상태를 조회해 민원을 처리한다.\n\n개인정보 처리현황을 갱신하는 과정에서 앱 개발팀이 도입한 신규 분석 SDK가 광고식별자·사용기록을 외부 분석 서버로 전송하고 있다는 사실이 뒤늦게 확인됐다. 배송 주소는 별도 파일 전송 방식으로 협력사에 전달되었고, 일부 예외 주문은 상담원이 스프레드시트로 처리했다.\n\n문서에는 주요 시스템만 표시되어 있어 외부 전송 경로, 수동 처리, API 호출, 백업·테스트 환경으로의 복제 흐름이 누락돼 있었다. 그 결과 어떤 경로에서 어떤 보호조치와 법적 검토가 필요한지 위험평가의 전제가 흔들리고 있었다.\n\n사업부는 전체 흐름도를 다시 만드는 것은 부담이 크므로, 우선 화면에 보이는 고객 정보만 점검하자고 제안했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「1.2.2 현황 및 흐름분석」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["업무·시스템·API·수동 처리·외부 수탁자·백업·분석 도구를 포함한 개인정보 및 정보자산 흐름을 재분석하고, 각 단계의 데이터 항목·수신자·전송 경로·보호조치·예외를 기록하여 위험평가와 법적 검토의 기준으로 사용한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「1.2.2 현황 및 흐름분석」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 업무·시스템·API·수동 처리·외부 수탁자·백업·분석 도구를 포함한 개인정보 및 정보자산 흐름을 재분석하고, 각 단계의 데이터 항목·수신자·전송 경로·보호조치·예외를 기록하여 위험평가와 법적 검토의 기준으로 사용한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 1.2.2 현황 및 흐름분석 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 1,008자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"1.2.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-04","conceptId":"long-04-1.2.3","difficulty":"상","area":"관리체계 수립·운영","tag":"1.2.3 위험 평가 · 장문 사례형","q":"위 상황에서 「1.2.3 위험 평가」 관점의 조치로 가장 적절한 것은?","p":"D사는 고객 포털의 관리자 기능을 클라우드로 이전하면서 운영 편의를 위해 관리자 접속을 인터넷에서 허용했다. 다만 특정 국가 IP 차단과 비밀번호 정책만 적용되어 있고, 강화인증과 접속 경로 제한은 아직 구현되지 않았다.\n\n프로젝트 책임자는 이전 일정이 촉박하다는 이유로 “관리자 수가 적으니 위험도도 낮다”고 판단했다. 보안팀은 관리자 계정 탈취, 외부 노출, 로그 분석 지연, 권한 오남용 가능성을 제기했지만, 자산가치·위협·취약점·발생 가능성·영향도를 기준으로 한 평가표는 작성되지 않았다.\n\n같은 시스템이라도 고객정보 조회 범위와 권한에 따라 영향이 달라질 수 있는데, 평가 결과에는 단순히 “클라우드 전환”이라는 항목만 있었다. 위험 허용기준과 잔여위험 승인권자도 불명확했다.\n\n사업부는 기술 세부사항을 모두 평가하면 출시가 늦어진다며, 추후 사고가 나면 보완하겠다는 입장을 보였다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「1.2.3 위험 평가」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","관리자 기능·개인정보·외부 노출 경로를 대상으로 자산가치, 위협, 취약점, 가능성, 영향도와 허용기준을 적용해 위험을 평가하고, 평가 근거·결과·잔여위험·승인 필요사항을 기록한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「1.2.3 위험 평가」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 관리자 기능·개인정보·외부 노출 경로를 대상으로 자산가치, 위협, 취약점, 가능성, 영향도와 허용기준을 적용해 위험을 평가하고, 평가 근거·결과·잔여위험·승인 필요사항을 기록한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 1.2.3 위험 평가 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 987자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"1.2.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-05","conceptId":"long-05-1.2.4","difficulty":"상","area":"관리체계 수립·운영","tag":"1.2.4 보호대책 선정 · 장문 사례형","q":"위 상황에서 「1.2.4 보호대책 선정」 관점의 조치로 가장 적절한 것은?","p":"E사는 취약점 점검에서 인터넷 공개 서버의 관리자 페이지가 여러 국가에서 접근 가능한 상태임을 확인했다. 운영팀은 웹방화벽 규칙을 추가하면 충분하다고 보았고, 개발팀은 강화인증과 별도 관리망 구성이 필요하다고 주장했다.\n\n위험평가 결과는 높음으로 분류되었지만, 어떤 보호대책을 선택할지와 대책별 책임자·기한·예산이 정리되지 않았다. 일부 담당자는 예외적으로 공개 접근을 유지해야 한다고 주장했으나, 업무상 필요성이나 대체통제는 문서화되지 않았다.\n\n보안팀은 단일 통제만으로는 계정 탈취·권한오남용·설정 오류 위험을 모두 줄이기 어렵다고 판단했다. 또한 고객정보 처리 시스템이므로 법적·계약상 요구사항도 함께 검토해야 한다고 보았다.\n\n경영진은 과도한 투자보다 실효적인 조합을 제시하라고 요구했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「1.2.4 보호대책 선정」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","위험평가와 법적·계약상 요구사항을 바탕으로 접근 경로 제한, 강화인증, 최소권한, 로그 점검, 예외 승인 등 적절한 보호대책 조합을 선정하고, 잔여위험·책임자·기한·승인 및 이행계획을 문서화한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「1.2.4 보호대책 선정」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 위험평가와 법적·계약상 요구사항을 바탕으로 접근 경로 제한, 강화인증, 최소권한, 로그 점검, 예외 승인 등 적절한 보호대책 조합을 선정하고, 잔여위험·책임자·기한·승인 및 이행계획을 문서화한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 1.2.4 보호대책 선정 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 938자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"1.2.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-06","conceptId":"long-06-1.4.1","difficulty":"상","area":"관리체계 수립·운영","tag":"1.4.1 법적 요구사항 준수 검토 · 장문 사례형","q":"위 상황에서 「1.4.1 법적 요구사항 준수 검토」 관점의 조치로 가장 적절한 것은?","p":"G사는 신규 건강관리 서비스를 출시하면서 건강정보, 위치기반 알림, 제휴사 쿠폰 기능을 함께 도입하려 한다. 제품팀은 기능별로 동의 화면을 만들었지만, 실제 처리 목적·제공 관계·보유기간·국외 클라우드 사용 여부를 법무와 보안이 함께 검토한 기록은 없다.\n\n출시 직전 협력사가 데이터 분석을 위해 원시 로그 접근을 요청했고, 해외 고객지원 도구에서 일부 문의 내용을 열람할 수 있다는 사실도 확인됐다. 제품팀은 화면 문구만 보완하면 된다고 판단했지만, 적용 법령·고시·계약 조건의 변경 영향을 체계적으로 식별하지 않았다.\n\n개발 명세서와 개인정보처리방침, 위탁계약, 정보자산 목록 사이에 처리 목적과 수신자가 서로 다르게 기재되어 있었다. 어떤 요구사항이 의무인지, 어떤 내용이 내부 정책인지 구분도 불명확했다.\n\n경영진은 출시 지연을 최소화하면서도 법령 위반 가능성을 낮출 수 있는 검토 체계를 요구했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「1.4.1 법적 요구사항 준수 검토」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","적용 가능한 법령·고시·계약상 요구사항을 기능·데이터·수탁자·국외이전 등 처리 단계별로 식별하고, 준수 여부와 변경 영향을 비교·검토한 뒤 필요한 동의·계약·보호조치·문서 갱신을 추적 관리한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「1.4.1 법적 요구사항 준수 검토」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 적용 가능한 법령·고시·계약상 요구사항을 기능·데이터·수탁자·국외이전 등 처리 단계별로 식별하고, 준수 여부와 변경 영향을 비교·검토한 뒤 필요한 동의·계약·보호조치·문서 갱신을 추적 관리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 1.4.1 법적 요구사항 준수 검토 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 1,011자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"1.4.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-07","conceptId":"long-07-1.4.3","difficulty":"상","area":"관리체계 수립·운영","tag":"1.4.3 관리체계 개선 · 장문 사례형","q":"위 상황에서 「1.4.3 관리체계 개선」 관점의 조치로 가장 적절한 것은?","p":"H사는 외부 침해사고 대응 훈련에서 연락망 오류와 로그 수집 지연을 발견했다. 훈련 후 담당자는 개선과제를 등록했지만, 담당 부서가 바뀌면서 기한과 완료 기준이 사라졌고 다음 훈련에서도 유사한 문제가 반복됐다.\n\n감사팀은 단순히 “훈련 실시”라는 기록만으로는 개선 효과를 입증하기 어렵다고 지적했다. 특히 원인이 인력 부족인지, 절차 불명확인지, 도구 설정 문제인지 분석되지 않아 동일한 재발방지 대책을 모든 조직에 일괄 적용하려는 상황이었다.\n\n일부 조치는 완료로 표시되었지만 실제 연락망 테스트, 로그 연계 테스트, 역할별 의사결정 훈련은 확인되지 않았다. 잔여위험을 수용한 사항도 누가 승인했는지 불분명했다.\n\n보안총괄책임자는 사고·점검·감사·변경에서 나온 문제를 하나의 개선 프로세스로 연결하라고 지시했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「1.4.3 관리체계 개선」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","점검·사고·훈련 결과의 근본원인과 영향 범위를 분석하고, 시정·예방조치별 책임자·기한·완료기준·잔여위험 승인·효과검증 방법을 정해 추적하며, 재점검으로 개선 효과를 확인한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「1.4.3 관리체계 개선」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 점검·사고·훈련 결과의 근본원인과 영향 범위를 분석하고, 시정·예방조치별 책임자·기한·완료기준·잔여위험 승인·효과검증 방법을 정해 추적하며, 재점검으로 개선 효과를 확인한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 1.4.3 관리체계 개선 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 955자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"1.4.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-08","conceptId":"long-08-2.2.2","difficulty":"상","area":"보호대책 요구사항","tag":"2.2.2 직무 분리 · 장문 사례형","q":"위 상황에서 「2.2.2 직무 분리」 관점의 조치로 가장 적절한 것은?","p":"I사는 긴급 장애 대응을 이유로 개발자에게 운영 DB의 관리자 권한과 배포 승인 권한을 함께 부여했다. 해당 개발자는 소스코드 수정, 테스트, 운영 반영, 로그 삭제까지 단독으로 수행할 수 있었다.\n\n한 고객이 주문 금액 오류를 제기하자 개발자는 운영 데이터 값을 직접 수정했고, 이후 분석을 위해 일부 로그를 정리했다. 변경 요청서에는 장애 대응이라고만 적혀 있었고, 독립적인 승인·검토자나 사후 검증 기록은 없었다.\n\n운영팀은 인력이 부족하므로 현실적으로 분리가 어렵다고 설명했다. 그러나 감사팀은 권한 집중으로 인해 오류·부정행위·무단 변경이 발견되지 않을 가능성이 높아진다고 평가했다.\n\n서비스를 멈추지 않으면서도 긴급 상황에 대응할 수 있는 보완통제가 필요했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「2.2.2 직무 분리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["개발·운영·승인·감사 역할을 원칙적으로 분리하고, 불가피한 긴급권한에는 시간 제한·사전 또는 사후 승인·행위 로그 보존·독립 검토·권한 회수 등 보완통제를 적용한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.2.2 직무 분리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 개발·운영·승인·감사 역할을 원칙적으로 분리하고, 불가피한 긴급권한에는 시간 제한·사전 또는 사후 승인·행위 로그 보존·독립 검토·권한 회수 등 보완통제를 적용한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.2.2 직무 분리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 1,070자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.2.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-09","conceptId":"long-09-2.2.5","difficulty":"상","area":"보호대책 요구사항","tag":"2.2.5 퇴직 및 직무변경 관리 · 장문 사례형","q":"위 상황에서 「2.2.5 퇴직 및 직무변경 관리」 관점의 조치로 가장 적절한 것은?","p":"J사는 고객지원 조직을 외주화하면서 기존 상담원 일부가 퇴직하고 일부는 다른 부서로 이동했다. 퇴직자는 업무용 노트북과 사내 메신저, 고객조회 시스템, 클라우드 공유폴더, VPN 계정을 사용해 왔다.\n\n퇴직 처리 후 두 달이 지나도 일부 계정이 활성화되어 있었고, 이동한 직원은 이전 부서의 고객정보 조회 권한을 유지하고 있었다. 자산 반납 확인서는 있었지만, API 키·공유메일함·개인 인증수단·외부 SaaS 초대 권한은 목록에 포함되지 않았다.\n\n인사팀은 퇴직 통보만 하면 각 부서가 알아서 권한을 정리한다고 설명했다. 보안팀은 퇴직·휴직·직무변경 이벤트와 계정·권한·자산 회수가 자동 또는 추적 가능한 절차로 연결돼야 한다고 판단했다.\n\n사업부는 즉시 모든 계정을 막으면 인수인계가 어렵다며 예외를 요청했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「2.2.5 퇴직 및 직무변경 관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","퇴직·휴직·직무변경 시점을 기준으로 계정·권한·API 키·장비·공유자원·외부 SaaS 접근을 목록화해 신속히 회수·변경하고, 인수인계가 필요한 예외는 기간·범위·승인·모니터링을 기록해 관리한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.2.5 퇴직 및 직무변경 관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 퇴직·휴직·직무변경 시점을 기준으로 계정·권한·API 키·장비·공유자원·외부 SaaS 접근을 목록화해 신속히 회수·변경하고, 인수인계가 필요한 예외는 기간·범위·승인·모니터링을 기록해 관리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.2.5 퇴직 및 직무변경 관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 950자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.2.5","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-10","conceptId":"long-10-2.3.2","difficulty":"상","area":"보호대책 요구사항","tag":"2.3.2 외부자 계약 시 보안 · 장문 사례형","q":"위 상황에서 「2.3.2 외부자 계약 시 보안」 관점의 조치로 가장 적절한 것은?","p":"K사는 고객상담 챗봇 운영을 외부 AI 서비스 사업자에게 맡기려 한다. 서비스 사업자는 문의 내용을 학습 품질 개선에 사용할 수 있는 표준 약관을 제시했고, 하위 클라우드 사업자와 해외 지원 인력이 일부 데이터를 처리할 수 있다고 설명했다.\n\n계약 초안에는 서비스 수준과 비용만 있고, 처리 목적 외 이용 제한, 접근권한, 재위탁, 사고 통지, 감독, 계약 종료 시 반환·파기, 비밀유지에 관한 구체적 조건이 빠져 있었다. 제품팀은 “유명한 사업자이므로 표준 약관이면 충분하다”고 주장했다.\n\n보안팀은 대화 내용에 개인정보와 민감한 상담 내용이 포함될 수 있으며, 위탁·국외 처리·재위탁 여부를 계약과 실제 운영에서 함께 통제해야 한다고 지적했다.\n\n법무팀은 계약을 지연하지 않되 최소한의 보호 조건을 명확히 하라고 요구했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「2.3.2 외부자 계약 시 보안」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","외부자의 업무범위와 처리 데이터, 접근자·재위탁·국외 처리 가능성을 확인하고, 목적 외 처리 금지, 기술적·관리적 보호조치, 접근·감사·사고통지, 재위탁 승인, 종료 시 반환·파기와 책임을 계약에 반영한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.3.2 외부자 계약 시 보안」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 외부자의 업무범위와 처리 데이터, 접근자·재위탁·국외 처리 가능성을 확인하고, 목적 외 처리 금지, 기술적·관리적 보호조치, 접근·감사·사고통지, 재위탁 승인, 종료 시 반환·파기와 책임을 계약에 반영한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.3.2 외부자 계약 시 보안 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 959자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.3.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-11","conceptId":"long-11-2.3.3","difficulty":"상","area":"보호대책 요구사항","tag":"2.3.3 외부자 보안 이행 관리 · 장문 사례형","q":"위 상황에서 「2.3.3 외부자 보안 이행 관리」 관점의 조치로 가장 적절한 것은?","p":"L사는 전자상거래 주문 포장 업무를 물류 협력사에 맡기고 있다. 협력사는 배송 라벨을 출력하기 위해 주문자 성명·주소·연락처를 조회하며, 성수기에는 단기 인력을 추가로 투입한다.\n\n협력사 현장 점검에서 공용 계정으로 주문관리 화면에 접속하고, 퇴직자 계정이 남아 있으며, 출력된 라벨 폐기 절차가 일정하지 않은 사실이 발견됐다. 계약서에는 보안 의무가 있었지만, 정기 점검 결과와 미흡사항 조치 기한은 관리되지 않았다.\n\n협력사는 본사 시스템에 직접 접속하지 않고 웹 화면만 사용하므로 큰 문제가 아니라고 주장했다. 그러나 본사는 수탁자의 실제 접근·재위탁·단기인력 관리가 계약 조건에 맞는지 확인할 증적이 부족했다.\n\n고객 배송을 중단할 수 없는 상황에서, 본사는 위험을 줄이면서 이행을 확인할 방안을 찾아야 했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「2.3.3 외부자 보안 이행 관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","수탁자의 계정·접근·출력물·단기인력·재위탁 등 실제 운영을 계약상 요구사항과 대조해 점검하고, 미흡사항별 개선기한·책임자·재점검·증적 제출을 관리하며 중대한 위반에는 접근 제한 등 조치를 적용한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.3.3 외부자 보안 이행 관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 수탁자의 계정·접근·출력물·단기인력·재위탁 등 실제 운영을 계약상 요구사항과 대조해 점검하고, 미흡사항별 개선기한·책임자·재점검·증적 제출을 관리하며 중대한 위반에는 접근 제한 등 조치를 적용한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.3.3 외부자 보안 이행 관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 960자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.3.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-12","conceptId":"long-12-2.4.2","difficulty":"상","area":"보호대책 요구사항","tag":"2.4.2 출입통제 · 장문 사례형","q":"위 상황에서 「2.4.2 출입통제」 관점의 조치로 가장 적절한 것은?","p":"M사는 사내 전산실과 네트워크 장비실을 운영한다. 시설관리 업체, 통신사 기사, 청소 인력, 개발자 등이 업무상 출입할 수 있으며, 일부 장비는 고객 서비스와 직접 연결되어 있다.\n\n장비 교체 작업 중 방문자가 동행 없이 전산실에 출입했고, 임시 출입카드가 반납되지 않은 사실이 확인됐다. 출입기록에는 이름만 있고 방문 목적, 승인자, 체류 시간, 반출입 장비 정보가 충분히 남아 있지 않았다.\n\n시설팀은 CCTV가 있으므로 별도 출입 기록은 필요하지 않다고 보았다. 보안팀은 보호구역의 중요도에 맞춰 권한·목적·시간·동행·기록을 통제하고, 예외 출입도 확인 가능해야 한다고 판단했다.\n\n운영부서는 야간 장애 대응에 지장이 없도록 간소화된 절차를 원했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 통제를 갖춘 신속한 전달 방안을 제시해야 했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「2.4.6 반출입 기기 통제」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["반출 대상 데이터와 필요성을 최소화한 뒤, 승인된 저장매체 또는 안전한 전송수단을 사용하고 암호화·수신자 확인·반출입 기록·보관기간·반납 또는 파기 확인을 적용하며 외부 분석 업체의 사본 관리도 계약·증적으로 확인한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.4.6 반출입 기기 통제」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 반출 대상 데이터와 필요성을 최소화한 뒤, 승인된 저장매체 또는 안전한 전송수단을 사용하고 암호화·수신자 확인·반출입 기록·보관기간·반납 또는 파기 확인을 적용하며 외부 분석 업체의 사본 관리도 계약·증적으로 확인한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.4.6 반출입 기기 통제 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 952자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.4.6","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-14","conceptId":"long-14-2.5.5","difficulty":"상","area":"보호대책 요구사항","tag":"2.5.5 특수 계정 및 권한 관리 · 장문 사례형","q":"위 상황에서 「2.5.5 특수 계정 및 권한 관리」 관점의 조치로 가장 적절한 것은?","p":"O사는 클라우드 운영을 위해 전사 관리자 계정, 데이터베이스 긴급 계정, 자동배포 서비스 계정을 사용한다. 여러 운영자가 장애 대응 시 동일한 관리자 계정을 공유하고, 비밀번호는 암호화된 문서에 보관된다고 설명한다.\n\n최근 새벽 시간대에 관리자 권한으로 방화벽 규칙이 변경됐지만, 누가 수행했는지 정확히 확인되지 않았다. 긴급 계정 사용 승인과 사용 후 회수 절차도 없었고, 자동배포 계정은 사람 계정과 같은 권한으로 콘솔에 로그인할 수 있었다.\n\n운영팀은 계정 수를 줄여야 관리가 쉽다고 주장했다. 보안팀은 특수계정의 공유·상시 사용·과도한 권한이 추적성과 책임성을 약화한다고 지적했다.\n\n서비스 가용성을 해치지 않으면서도 긴급 대응과 자동화에 필요한 권한을 관리해야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「2.5.5 특수 계정 및 권한 관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","관리자·긴급·서비스 계정을 용도별로 분리하고 개인 식별·최소권한·승인·보관·사용시간 제한·행위기록·정기검토·회수 절차를 적용하며, 자동화 계정은 필요한 시스템과 권한으로만 제한한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.5.5 특수 계정 및 권한 관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 관리자·긴급·서비스 계정을 용도별로 분리하고 개인 식별·최소권한·승인·보관·사용시간 제한·행위기록·정기검토·회수 절차를 적용하며, 자동화 계정은 필요한 시스템과 권한으로만 제한한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.5.5 특수 계정 및 권한 관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 930자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.5.5","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-15","conceptId":"long-15-2.5.6","difficulty":"상","area":"보호대책 요구사항","tag":"2.5.6 접근권한 검토 · 장문 사례형","q":"위 상황에서 「2.5.6 접근권한 검토」 관점의 조치로 가장 적절한 것은?","p":"P사는 조직개편 후 데이터 분석팀과 고객지원팀의 역할이 변경되었지만, 기존 시스템 권한은 그대로 유지하고 있다. 데이터 분석가는 고객 식별정보가 포함된 원본 데이터를 조회할 수 있고, 고객지원팀은 과거 업무에서 사용하던 관리자 메뉴에 접근할 수 있다.\n\n분기 권한 점검은 계정 목록을 이메일로 회신받는 방식으로 진행됐으나, 실제 업무 필요성·권한 범위·승인자·미회신 계정은 확인하지 않았다. 일부 휴직자·외부자 계정도 검토 대상에서 빠졌다.\n\n부서장은 권한 검토가 형식적인 업무라고 생각해 목록에 “유지”라고만 답변했다. 보안팀은 개인정보 접근과 관리자 권한은 업무 변화·계약 종료·사고 발생 시 수시로 재검토할 필요가 있다고 보았다.\n\n경영진은 권한을 모두 삭제하는 방식이 아니라, 최소권한 원칙을 적용하면서 업무 효율을 유지할 방안을 요구했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「2.5.6 접근권한 검토」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","계정·역할·개인정보 접근·관리자 권한을 대상으로 업무 필요성, 소유자, 승인, 외부자·휴직·퇴직 상태를 정기 및 수시로 검토하고, 불필요·과도·미확인 권한은 회수하며 검토 결과와 예외 승인 증적을 남긴다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.5.6 접근권한 검토」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 계정·역할·개인정보 접근·관리자 권한을 대상으로 업무 필요성, 소유자, 승인, 외부자·휴직·퇴직 상태를 정기 및 수시로 검토하고, 불필요·과도·미확인 권한은 회수하며 검토 결과와 예외 승인 증적을 남긴다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.5.6 접근권한 검토 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 967자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.5.6","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-16","conceptId":"long-16-2.6.4","difficulty":"상","area":"보호대책 요구사항","tag":"2.6.4 데이터베이스 접근 · 장문 사례형","q":"위 상황에서 「2.6.4 데이터베이스 접근」 관점의 조치로 가장 적절한 것은?","p":"Q사는 운영 DB에서 고객 주문과 결제 상태를 관리한다. 개발자는 성능 분석을 위해 DB 콘솔에 접속하고, 상담팀은 별도 조회 도구를 통해 고객 정보를 확인한다. 야간 배치 프로그램은 DB 관리자 계정을 사용한다.\n\n보안 점검에서 개발자의 개인 계정으로 운영 DB에 직접 접속할 수 있고, 조회·수정·다운로드 권한이 구분되지 않았다는 사실이 확인됐다. 중요한 테이블을 조회한 기록은 남지만, 실제 조회 조건과 대량 추출 여부는 분석하기 어려웠다.\n\n운영팀은 장애 분석을 위해 직접 접속이 필요하다고 주장했고, 개발팀은 테스트 환경의 데이터가 최신이 아니라 운영 DB를 봐야 한다고 설명했다. 그러나 접근 목적, 승인, 시간 제한, 명령어 통제, 대량 조회 경보는 체계적으로 관리되지 않았다.\n\n고객 서비스 중단 없이도 운영 DB의 중요 데이터 접근 위험을 줄여야 했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「2.6.4 데이터베이스 접근」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","운영 DB의 접근자·권한·접근경로·명령 범위를 최소화하고, 직접 접속은 승인된 목적·시간·계정으로 제한하며 중요 데이터 조회·변경·대량 추출을 식별 가능한 로그로 기록·점검하고 대체 분석 환경을 마련한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.6.4 데이터베이스 접근」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 운영 DB의 접근자·권한·접근경로·명령 범위를 최소화하고, 직접 접속은 승인된 목적·시간·계정으로 제한하며 중요 데이터 조회·변경·대량 추출을 식별 가능한 로그로 기록·점검하고 대체 분석 환경을 마련한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.6.4 데이터베이스 접근 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 986자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.6.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-17","conceptId":"long-17-2.6.6","difficulty":"상","area":"보호대책 요구사항","tag":"2.6.6 원격접근 통제 · 장문 사례형","q":"위 상황에서 「2.6.6 원격접근 통제」 관점의 조치로 가장 적절한 것은?","p":"R사는 재택근무와 해외 협력사 지원을 위해 VPN을 운영한다. 협력사 엔지니어는 고객 포털 장애 시 원격으로 운영 서버에 접속해 설정을 변경할 수 있으며, 일부 직원은 개인 PC에서도 VPN을 사용할 수 있다.\n\n점검 결과 협력사 계정은 프로젝트 종료 후에도 유지되고, 접속 가능 시간·대상 시스템·국가·기기 보안상태에 대한 제한이 약했다. 다단계 인증은 일부 시스템에만 적용됐고, 원격 세션 기록은 보안팀이 요청해야만 확인할 수 있었다.\n\n협력사는 긴급 대응을 위해 상시 접근이 필요하다고 했고, 사업부는 해외 출장 중에도 업무를 해야 한다고 설명했다. 보안팀은 원격접속의 필요성을 인정하되 계정·기기·경로·시간·기록을 통제해야 한다고 판단했다.\n\n새로운 접근 통제가 장애 대응 시간을 과도하게 늘리지 않도록 설계해야 했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「2.6.6 원격접근 통제」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","원격접속 대상·사용자·기기·시간·접속경로를 업무 필요에 따라 제한하고, 강화인증·승인·세션 또는 접속기록·종료 후 권한회수·기기 보안상태 확인을 적용하며 협력사의 상시 접근은 예외 승인과 정기 재검토로 관리한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.6.6 원격접근 통제」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 원격접속 대상·사용자·기기·시간·접속경로를 업무 필요에 따라 제한하고, 강화인증·승인·세션 또는 접속기록·종료 후 권한회수·기기 보안상태 확인을 적용하며 협력사의 상시 접근은 예외 승인과 정기 재검토로 관리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.6.6 원격접근 통제 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 962자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.6.6","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-18","conceptId":"long-18-2.7.2","difficulty":"상","area":"보호대책 요구사항","tag":"2.7.2 암호키 관리 · 장문 사례형","q":"위 상황에서 「2.7.2 암호키 관리」 관점의 조치로 가장 적절한 것은?","p":"S사는 고객정보를 저장하는 DB와 백업 파일을 암호화하고 있으며, 애플리케이션이 사용하는 암호키를 소스코드 저장소의 환경설정 파일에 넣어 배포해 왔다. 개발·운영·외주 인력이 동일한 키 값을 열람할 수 있다.\n\n외주 개발 계약이 종료됐지만 키 교체 여부와 키 보관 위치를 확인하지 못했다. 백업 복구 시험을 위해 키를 메신저로 전달한 기록도 있었고, 어떤 키가 어떤 데이터와 시스템에 연결되어 있는지 목록이 최신화되지 않았다.\n\n개발팀은 데이터가 암호화되어 있으므로 키 관리 문제는 상대적으로 작다고 보았다. 보안팀은 키가 노출되면 암호화 효과가 약화되고, 키 생성·분배·보관·사용·교체·폐기·접근권한이 분리돼야 한다고 지적했다.\n\n운영 중단 없이 키 관리체계를 개선하고, 기존 키 노출 가능성도 평가해야 했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「2.7.2 암호키 관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["암호키별 소유자·용도·적용 시스템·보관 위치·접근권한을 관리하고, 소스코드·메신저 등 부적절한 경로의 키를 안전한 키관리 수단으로 이관하며 계약 종료·노출 의심·주기적 정책에 따라 키 교체·폐기와 사용기록 점검을 수행한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.7.2 암호키 관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 암호키별 소유자·용도·적용 시스템·보관 위치·접근권한을 관리하고, 소스코드·메신저 등 부적절한 경로의 키를 안전한 키관리 수단으로 이관하며 계약 종료·노출 의심·주기적 정책에 따라 키 교체·폐기와 사용기록 점검을 수행한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.7.2 암호키 관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 943자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.7.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-19","conceptId":"long-19-2.8.1","difficulty":"상","area":"보호대책 요구사항","tag":"2.8.1 보안 요구사항 정의 · 장문 사례형","q":"위 상황에서 「2.8.1 보안 요구사항 정의」 관점의 조치로 가장 적절한 것은?","p":"T사는 회원 추천 기능을 도입하면서 이용자의 연락처 동기화, 추천 결과 표시, 푸시 알림을 설계하고 있다. 기획서는 사용자 편의와 전환율만 다루고, 어떤 정보가 수집·저장·전송되는지와 권한·동의·보유기간·삭제 방식은 구체화되지 않았다.\n\n개발사는 빠른 출시를 위해 기존 회원가입 모듈을 재사용하자고 제안했다. 그러나 신규 기능은 연락처와 관계정보를 다룰 수 있고, 외부 푸시 서비스·분석 도구와 연계될 가능성이 있어 기존 요구사항만으로는 충분하지 않았다.\n\n보안·개인정보 담당자는 개발 완료 후 점검하면 수정 비용이 커질 수 있다고 경고했다. 제품팀은 구현 세부사항을 개발자가 알아서 결정하면 된다고 보았지만, 책임자·승인자·시험 기준이 없는 상태였다.\n\n서비스 기능을 포기하지 않으면서도 설계 단계에서 필요한 보호 요구사항을 명세화해야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「2.8.1 보안 요구사항 정의」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","신규 기능의 데이터 항목·처리 목적·이용자 권한·외부 연계·보관·파기·접근통제·전송보안·로그·동의 및 고지 요건을 분석해 보안·개인정보보호 요구사항으로 명세화하고, 책임자 승인과 개발·시험 기준으로 연결한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.8.1 보안 요구사항 정의」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 신규 기능의 데이터 항목·처리 목적·이용자 권한·외부 연계·보관·파기·접근통제·전송보안·로그·동의 및 고지 요건을 분석해 보안·개인정보보호 요구사항으로 명세화하고, 책임자 승인과 개발·시험 기준으로 연결한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.8.1 보안 요구사항 정의 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 965자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.8.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-20","conceptId":"long-20-2.8.3","difficulty":"상","area":"보호대책 요구사항","tag":"2.8.3 시험과 운영 환경 분리 · 장문 사례형","q":"위 상황에서 「2.8.3 시험과 운영 환경 분리」 관점의 조치로 가장 적절한 것은?","p":"U사는 신규 결제 기능을 검증하기 위해 운영 클라우드 계정 안에 별도 테스트 서버를 만들었다. 개발자들은 편의를 위해 운영 관리자 권한으로 테스트 환경에 접속하고, 테스트 서버는 운영 DB의 복제본과 동일한 네트워크 구간에 있다.\n\n테스트 중 설정 오류로 테스트 API가 외부에 노출됐고, 운영용 비밀값 일부가 환경변수에 포함된 사실이 발견됐다. 개발팀은 “테스트 서버이므로 실제 서비스에는 영향이 없다”고 했지만, 복제 데이터에는 고객 식별정보와 거래 이력이 포함될 수 있었다.\n\n운영·개발·시험 환경의 계정, 네트워크, 데이터, 배포 경로, 모니터링 책임이 혼재되어 있어 실제 접근과 변경을 구분하기 어려웠다. 보안팀은 단순히 서버 이름만 다른 것은 환경 분리가 아니라고 판단했다.\n\n프로젝트 일정상 테스트를 중단하기보다 안전한 분리와 데이터 통제를 빠르게 적용할 필요가 있었다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「2.8.3 시험과 운영 환경 분리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","운영·개발·시험 환경을 계정·네트워크·권한·비밀값·배포 경로 관점에서 분리하고, 운영 데이터 반입은 필요성·승인·보호조치에 따라 제한하며 테스트 환경의 외부 노출·관리자 접근·로그를 별도로 통제한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.8.3 시험과 운영 환경 분리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 운영·개발·시험 환경을 계정·네트워크·권한·비밀값·배포 경로 관점에서 분리하고, 운영 데이터 반입은 필요성·승인·보호조치에 따라 제한하며 테스트 환경의 외부 노출·관리자 접근·로그를 별도로 통제한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.8.3 시험과 운영 환경 분리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 992자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.8.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-21","conceptId":"long-21-2.8.4","difficulty":"상","area":"보호대책 요구사항","tag":"2.8.4 시험 데이터 보안 · 장문 사례형","q":"위 상황에서 「2.8.4 시험 데이터 보안」 관점의 조치로 가장 적절한 것은?","p":"V사는 고객 불만 재현을 위해 운영 DB의 일부를 추출해 개발용 분석 환경에 제공하려 한다. 데이터에는 이름, 연락처, 주문 내역, 상담 메모, 배송지 정보가 포함될 수 있으며, 개발자와 외주 QA 인력이 함께 사용할 예정이다.\n\n담당자는 오류 재현 정확도를 위해 원본 데이터를 그대로 복사해야 한다고 주장했다. 그러나 필요한 데이터 범위, 가명·마스킹 가능성, 접근자, 사용기간, 반출·삭제 방법, 외주 인력의 접근 조건은 정해져 있지 않았다.\n\n과거 테스트 데이터는 프로젝트 종료 후에도 공유 저장소에 남아 있었고, 누가 내려받았는지 확인할 수 없는 경우가 있었다. 개인정보처리 시스템에서 발생한 오류를 해결하기 위한 목적이라고 해도, 불필요한 정보까지 복제할 근거는 부족했다.\n\n오류 분석의 품질을 유지하면서 개인정보 노출 가능성을 줄이는 대안을 마련해야 했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「2.8.4 시험 데이터 보안」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","시험 목적에 필요한 최소 범위만 사용하고, 가능한 경우
