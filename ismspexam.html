 가명처리·마스킹·합성데이터를 우선 적용하며, 원본 사용이 불가피하면 승인·접근권한·격리·사용기간·반출 제한·로그·종료 후 파기 확인을 포함한 통제를 적용한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.8.4 시험 데이터 보안」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 시험 목적에 필요한 최소 범위만 사용하고, 가능한 경우 가명처리·마스킹·합성데이터를 우선 적용하며, 원본 사용이 불가피하면 승인·접근권한·격리·사용기간·반출 제한·로그·종료 후 파기 확인을 포함한 통제를 적용한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.8.4 시험 데이터 보안 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 985자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.8.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-22","conceptId":"long-22-2.8.6","difficulty":"상","area":"보호대책 요구사항","tag":"2.8.6 운영환경 이관 · 장문 사례형","q":"위 상황에서 「2.8.6 운영환경 이관」 관점의 조치로 가장 적절한 것은?","p":"W사는 모바일 앱 업데이트를 긴급 배포해야 한다. 업데이트에는 인증 모듈 변경, 로그 수집 방식 변경, 개인정보처리방침 화면 수정, 외부 SDK 버전 변경이 포함되어 있다.\n\n개발팀은 장애 가능성을 줄이기 위해 밤에 직접 운영환경에 배포하겠다고 했고, 운영팀은 기존 배포 절차가 시간이 많이 든다고 설명했다. 변경 요청서에는 기능 설명만 있고, 보안요구사항 시험 결과, 승인자, 롤백 계획, 배포 전후 확인 항목이 충분히 기록되지 않았다.\n\n과거에는 빠른 배포 뒤 인증 오류가 발생해 고객이 로그인하지 못했고, 로그 수집이 중단됐지만 원인을 추적하는 데 시간이 걸렸다. 이번에도 배포 담당자의 권한과 검토자의 역할이 분리되어 있지 않았다.\n\n서비스 중단 위험과 보안·개인정보 영향 모두를 고려한 이관 절차가 필요했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「2.8.6 운영환경 이관」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","운영 이관 전 보안·기능·개인정보 영향 시험, 승인, 배포 권한, 롤백 계획, 변경기록, 배포 전후 점검 기준을 확인하고, 긴급 변경은 최소 요건과 사후 검토를 포함한 별도 절차로 통제한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.8.6 운영환경 이관」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 운영 이관 전 보안·기능·개인정보 영향 시험, 승인, 배포 권한, 롤백 계획, 변경기록, 배포 전후 점검 기준을 확인하고, 긴급 변경은 최소 요건과 사후 검토를 포함한 별도 절차로 통제한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.8.6 운영환경 이관 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 957자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.8.6","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-23","conceptId":"long-23-2.9.3","difficulty":"상","area":"보호대책 요구사항","tag":"2.9.3 백업 및 복구관리 · 장문 사례형","q":"위 상황에서 「2.9.3 백업 및 복구관리」 관점의 조치로 가장 적절한 것은?","p":"X사는 랜섬웨어 대비를 위해 고객 DB와 파일 저장소를 매일 백업한다. 백업 파일은 운영망과 동일한 클라우드 계정에 보관되고, 복구 절차는 몇 년 전 작성된 문서에만 남아 있다.\n\n최근 장애 대응에서 백업 파일은 존재했지만, 필요한 시점의 데이터인지, 암호키가 있는지, 실제로 복구 가능한지 즉시 확인하지 못했다. 백업 접근권한은 여러 운영자에게 넓게 부여되어 있고, 외부 백업 업체의 저장·반환·파기 조건도 명확하지 않았다.\n\n운영팀은 백업 성공 로그가 있으므로 복구 가능성이 보장된다고 보았다. 보안팀은 백업 대상·주기·보관·접근·암호화·복구 목표·정기 시험이 함께 관리되어야 한다고 지적했다.\n\n경영진은 고객정보 유실과 서비스 중단을 줄이기 위해 실제 복구 가능성을 검증하라고 지시했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「2.9.3 백업 및 복구관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["중요 데이터·설정·시스템의 백업 대상과 보관·암호화·접근권한을 관리하고, 운영환경과 분리된 보호수단을 고려하며, 복구 절차·암호키·복구 목표를 포함한 정기 복구시험으로 실제 복구 가능성과 개선사항을 확인한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.9.3 백업 및 복구관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 중요 데이터·설정·시스템의 백업 대상과 보관·암호화·접근권한을 관리하고, 운영환경과 분리된 보호수단을 고려하며, 복구 절차·암호키·복구 목표를 포함한 정기 복구시험으로 실제 복구 가능성과 개선사항을 확인한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.9.3 백업 및 복구관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 935자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.9.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-24","conceptId":"long-24-2.9.4","difficulty":"상","area":"보호대책 요구사항","tag":"2.9.4 로그 및 접속기록 관리 · 장문 사례형","q":"위 상황에서 「2.9.4 로그 및 접속기록 관리」 관점의 조치로 가장 적절한 것은?","p":"Y사는 고객관리 시스템의 로그인 기록과 관리자 변경 로그를 수집하지만, 시스템마다 시간대와 형식이 다르다. 일부 로그는 개발자가 직접 삭제할 수 있고, 저장 용량 부족 시 오래된 기록을 자동으로 덮어쓴다.\n\n고객정보 대량 조회 의심 신고가 접수됐으나, 어떤 계정이 언제 어떤 조건으로 조회했는지와 해당 시스템의 시간 기준을 정확히 맞추기 어려웠다. 외부 솔루션의 로그는 별도 계정에 저장되어 있어 사고 대응팀이 즉시 접근할 수 없었다.\n\n운영팀은 로그가 생성되고 있다는 사실만으로 충분하다고 보았다. 보안팀은 보안상 중요한 접속·변경·오류·권한 행위가 식별 가능해야 하고, 위변조 방지·보관·접근통제·시간 일관성이 필요하다고 지적했다.\n\n서비스 성능과 저장 비용을 고려하면서도 조사 가능한 수준의 기록을 유지해야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「2.9.4 로그 및 접속기록 관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","중요 접속·권한·조회·변경·오류·보안경보를 식별 가능한 형태로 수집하고, 시간 동기화·무결성 보호·접근권한·보관정책·용량 관리·중앙화 또는 신속한 열람 절차를 적용해 사고 분석에 활용할 수 있도록 한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.9.4 로그 및 접속기록 관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 중요 접속·권한·조회·변경·오류·보안경보를 식별 가능한 형태로 수집하고, 시간 동기화·무결성 보호·접근권한·보관정책·용량 관리·중앙화 또는 신속한 열람 절차를 적용해 사고 분석에 활용할 수 있도록 한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.9.4 로그 및 접속기록 관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 953자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.9.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-25","conceptId":"long-25-2.10.2","difficulty":"상","area":"보호대책 요구사항","tag":"2.10.2 클라우드 보안 · 장문 사례형","q":"위 상황에서 「2.10.2 클라우드 보안」 관점의 조치로 가장 적절한 것은?","p":"Z사는 고객 서비스 전체를 퍼블릭 클라우드에서 운영한다. 개발팀은 신속한 배포를 위해 여러 프로젝트 계정과 저장소를 만들었고, 일부 저장소는 외부 협력사가 파일을 올릴 수 있도록 공개 접근을 허용했다.\n\n정기 점검에서 사용하지 않는 계정, 인터넷에 노출된 관리 콘솔, 공개 설정된 객체 저장소, 미확인 API 키가 발견됐다. 서비스 제공자의 보안 기능을 사용하고 있으므로 책임은 클라우드 사업자에게 있다는 인식도 일부 존재했다.\n\n자산·구성·접근권한·데이터 위치·암호화·감사 로그·계약 종료 시 데이터 회수 계획이 한 문서에 연결돼 있지 않았다. 장애나 계약 변경 시 누가 어떤 책임을 지는지도 부서마다 다르게 이해하고 있었다.\n\n클라우드 사용을 중단하지 않고 책임분담과 구성 관리의 공백을 줄여야 했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「2.10.2 클라우드 보안」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","클라우드 서비스의 책임분담을 계약·기술구성·운영절차에 반영하고, 계정·자산·네트워크·저장소 공개설정·접근권한·암호화·로그·키·외부자 접근·종료 시 데이터 회수와 파기를 위험기반으로 관리·점검한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.10.2 클라우드 보안」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 클라우드 서비스의 책임분담을 계약·기술구성·운영절차에 반영하고, 계정·자산·네트워크·저장소 공개설정·접근권한·암호화·로그·키·외부자 접근·종료 시 데이터 회수와 파기를 위험기반으로 관리·점검한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.10.2 클라우드 보안 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 944자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.10.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-26","conceptId":"long-26-2.10.8","difficulty":"상","area":"보호대책 요구사항","tag":"2.10.8 패치관리 · 장문 사례형","q":"위 상황에서 「2.10.8 패치관리」 관점의 조치로 가장 적절한 것은?","p":"AA사는 고객 포털의 웹서버와 VPN 장비에 대한 고위험 취약점 공지가 나온 뒤 패치 적용 여부를 검토하고 있다. 운영팀은 서비스 중단 우려 때문에 다음 정기 점검일까지 미루자고 제안했다.\n\n보안팀은 해당 장비가 인터넷에 노출되어 있고 관리자 기능과 연결돼 있어 우선순위가 높다고 평가했다. 그러나 자산 목록에는 장비 버전과 소유자가 정확히 기록되지 않았고, 패치 전 시험·적용·롤백·예외 승인·사후 검증 절차도 표준화되어 있지 않았다.\n\n과거에는 패치를 적용한 뒤 성능 문제가 발생해 운영팀이 임의로 이전 버전으로 되돌렸고, 그 과정의 기록이 남지 않았다. 반대로 몇몇 서버는 패치 대상인지 확인되지 않아 장기간 취약한 상태로 남아 있었다.\n\n사업부는 안정성과 보안을 모두 고려한 우선순위 기반의 패치관리 방안을 요구했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「2.10.8 패치관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","패치 대상 자산·버전·노출도·업무 중요도·취약점 위험을 식별해 우선순위를 정하고, 시험·승인·적용·롤백·사후 확인·예외 승인과 보완통제를 기록하며 미적용 상태와 잔여위험을 지속적으로 관리한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.10.8 패치관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 패치 대상 자산·버전·노출도·업무 중요도·취약점 위험을 식별해 우선순위를 정하고, 시험·승인·적용·롤백·사후 확인·예외 승인과 보완통제를 기록하며 미적용 상태와 잔여위험을 지속적으로 관리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.10.8 패치관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 957자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.10.8","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-27","conceptId":"long-27-2.10.9","difficulty":"상","area":"보호대책 요구사항","tag":"2.10.9 악성코드 통제 · 장문 사례형","q":"위 상황에서 「2.10.9 악성코드 통제」 관점의 조치로 가장 적절한 것은?","p":"AB사는 직원이 받은 첨부파일을 열어본 뒤 파일 서버에서 이상한 암호화 흔적을 발견했다. 단말기 보안 프로그램은 설치되어 있었지만, 일부 노트북은 업데이트가 지연되어 있었고 외부 저장매체 사용 통제도 약했다.\n\n사고 초기에는 파일 공유만 중단하면 된다는 의견이 나왔으나, 동일 계정으로 접속한 클라우드 저장소와 메일함, 백업 시스템, 원격접속 기록도 영향을 받을 수 있었다. 담당자는 의심 파일을 삭제했지만, 원본과 실행 흔적을 보존하지 않아 분석이 어려워질 우려가 생겼다.\n\n직원 교육은 연 1회 일반 안내 수준이었고, 피싱 대응·의심 신고·격리 절차를 실제로 훈련한 적은 없었다. 보안팀은 예방·탐지·차단·대응·복구가 이어지는 체계가 필요하다고 판단했다.\n\n서비스 가용성과 증거보전, 확산 방지 사이에서 우선순위를 정해야 했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「2.10.9 악성코드 통제」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","감염 의심 단말과 계정을 신속히 격리·통제하고 증거를 보전하며, 관련 로그·저장소·원격접속·백업 영향을 조사한 뒤 악성코드 탐지·차단·업데이트·사용자 신고·교육·복구 절차를 보완하고 재발방지 효과를 확인한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.10.9 악성코드 통제」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 감염 의심 단말과 계정을 신속히 격리·통제하고 증거를 보전하며, 관련 로그·저장소·원격접속·백업 영향을 조사한 뒤 악성코드 탐지·차단·업데이트·사용자 신고·교육·복구 절차를 보완하고 재발방지 효과를 확인한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.10.9 악성코드 통제 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 966자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.10.9","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-28","conceptId":"long-28-2.11.2","difficulty":"상","area":"보호대책 요구사항","tag":"2.11.2 취약점 점검 및 조치 · 장문 사례형","q":"위 상황에서 「2.11.2 취약점 점검 및 조치」 관점의 조치로 가장 적절한 것은?","p":"AC사는 외부 모의해킹에서 관리자 페이지의 인증 우회 가능성과 오래된 오픈소스 라이브러리 취약점을 발견했다. 일부 취약점은 즉시 조치할 수 있지만, 핵심 결제 모듈은 수정 시 서비스 영향이 클 수 있다.\n\n개발팀은 취약점 목록을 받아 수정 계획을 세웠으나, 실제 영향받는 시스템·데이터·외부 노출 여부·악용 가능성·보완통제·재검증 기준은 정리되지 않았다. 운영팀은 취약점 점검 보고서를 파일로 보관하면 심사 대응에는 충분하다고 생각했다.\n\n위험 수용이 필요한 항목에 대해 승인권자와 재검토 시점이 없고, 조치 완료로 표시된 항목도 재점검 결과가 없었다. 고객정보를 처리하는 시스템과 단순 내부 도구가 같은 우선순위로 처리되었다.\n\n한정된 인력으로 위험이 큰 항목부터 조치하면서도 잔여위험을 투명하게 관리해야 했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「2.11.2 취약점 점검 및 조치」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["취약점별 자산·노출·악용 가능성·영향·법적·업무 중요도를 평가해 우선순위를 정하고, 조치·보완통제·위험수용·승인·기한·재검증·재평가를 추적 관리하며 보고서 보관만으로 종료하지 않는다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.11.2 취약점 점검 및 조치」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 취약점별 자산·노출·악용 가능성·영향·법적·업무 중요도를 평가해 우선순위를 정하고, 조치·보완통제·위험수용·승인·기한·재검증·재평가를 추적 관리하며 보고서 보관만으로 종료하지 않는다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.11.2 취약점 점검 및 조치 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 950자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.11.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-29","conceptId":"long-29-2.11.5","difficulty":"상","area":"보호대책 요구사항","tag":"2.11.5 사고 대응 및 복구 · 장문 사례형","q":"위 상황에서 「2.11.5 사고 대응 및 복구」 관점의 조치로 가장 적절한 것은?","p":"AD사는 외부 IP에서 고객관리 시스템의 관리자 콘솔에 반복 접속한 기록을 발견했다. 일부 로그인 시도는 실패했지만, 특정 계정으로 비정상적인 조회가 있었는지와 개인정보 유출 여부는 아직 확인되지 않았다.\n\n운영팀은 우선 관련 서버를 재시작하고 로그를 정리하자고 제안했다. 보안팀은 재시작이나 로그 정리가 증거를 훼손할 수 있고, 계정·네트워크·DB·외부 연계·백업·수탁자까지 영향 범위를 확인해야 한다고 보았다.\n\n사고대응 연락망에는 법무·개인정보·홍보·고객지원 역할이 누락되어 있었고, 외부 통지나 고객 문의 대응 기준도 구체적이지 않았다. 이전 훈련에서는 기술팀만 참여했다.\n\n불필요한 공포를 만들지 않으면서도 법적·계약상 통지 필요성과 실제 피해 가능성을 신속히 판단해야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「2.11.5 사고 대응 및 복구」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","침해 의심 징후에 대해 관련 계정·경로를 우선 통제하고 로그·설정·이미지 등 증거를 보전하며, 영향 범위·개인정보 포함 여부·유출 가능성·원인을 분석한 뒤 차단·복구·통지·대외 대응·재발방지 절차를 역할별로 수행·기록한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.11.5 사고 대응 및 복구」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 침해 의심 징후에 대해 관련 계정·경로를 우선 통제하고 로그·설정·이미지 등 증거를 보전하며, 영향 범위·개인정보 포함 여부·유출 가능성·원인을 분석한 뒤 차단·복구·통지·대외 대응·재발방지 절차를 역할별로 수행·기록한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.11.5 사고 대응 및 복구 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 933자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.11.5","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-30","conceptId":"long-30-2.12.2","difficulty":"상","area":"보호대책 요구사항","tag":"2.12.2 재해 복구 시험 및 개선 · 장문 사례형","q":"위 상황에서 「2.12.2 재해 복구 시험 및 개선」 관점의 조치로 가장 적절한 것은?","p":"AE사는 지역 장애에 대비해 다른 리전에 대기 시스템을 운영한다고 설명한다. 그러나 실제 전환 시험은 문서 검토 수준으로만 이루어졌고, 고객 인증, 결제 연계, 외부 문자 발송, 백업 복구, 운영자 접근 권한이 대체 환경에서도 정상 동작하는지 확인한 적이 없다.\n\n최근 대규모 네트워크 장애로 주 리전이 불안정해지자 운영팀은 전환 절차를 시도했지만, 대기 환경의 설정이 오래되어 인증서가 만료됐고 일부 고객 데이터가 최신 백업과 일치하지 않는 문제가 발견됐다.\n\n복구계획에는 복구 목표와 우선순위가 포괄적으로만 적혀 있고, 시험 시나리오·역할·성공 기준·결함 조치·재시험 기록이 부족했다. 경영진은 백업이 있으니 실제 전환 시험까지는 필요 없다고 생각해 왔다.\n\n서비스 연속성과 개인정보·거래 데이터의 정합성을 함께 검증해야 했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「2.12.2 재해 복구 시험 및 개선」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","중요 업무·시스템·외부 연계·권한·데이터 정합성을 포함한 현실적 복구 시나리오로 전환·복구 시험을 수행하고, 복구 목표·성공 기준·결함·책임자·개선기한·재시험 결과를 기록하여 실제 복구 가능성을 검증한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「2.12.2 재해 복구 시험 및 개선」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 중요 업무·시스템·외부 연계·권한·데이터 정합성을 포함한 현실적 복구 시나리오로 전환·복구 시험을 수행하고, 복구 목표·성공 기준·결함·책임자·개선기한·재시험 결과를 기록하여 실제 복구 가능성을 검증한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 2.12.2 재해 복구 시험 및 개선 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31)","u":"https://isms-p.or.kr/ntcn/rcsrm/selectGnrlRcsrmList.do","v":"장문 사례형 문항 검토 · 공백 포함 지문 965자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"2.12.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-31","conceptId":"long-31-3.1.1","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.1.1 개인정보 수집·이용 · 장문 사례형","q":"위 상황에서 「3.1.1 개인정보 수집·이용」 관점의 조치로 가장 적절한 것은?","p":"AF사는 온라인 건강상담 예약 서비스를 출시하면서 회원가입 시 성명, 연락처, 생년월일, 증상 설명, 선호 병원 정보를 수집하려 한다. 기획서는 예약 편의와 맞춤 안내를 모두 하나의 목적로 설명하고 있으며, 각 항목의 필요성·보유기간·선택 여부는 구분되지 않았다.\n\n마케팅팀은 추후 건강 관련 콘텐츠 추천에도 활용할 수 있도록 증상 설명을 장기 보관하자고 제안했다. 개발팀은 동의 화면에 긴 문구를 넣으면 된다고 보았지만, 실제 수집 목적과 처리 근거, 항목별 필요성, 보유기간, 고지 내용이 화면·DB·처리방침에 일치하는지 점검하지 않았다.\n\n일부 상담 내용은 민감한 정보가 될 수 있고, 예약 완료 후에도 모든 정보를 같은 기간 동안 유지할 근거가 불분명했다. 고객이 수집 이유를 물을 때 상담원이 설명할 기준도 마련되어 있지 않았다.\n\n서비스 기능을 유지하면서도 목적과 항목에 맞는 수집·이용 체계를 설계해야 했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「3.1.1 개인정보 수집·이용」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","수집·이용 목적별로 처리 근거, 필요한 항목, 필수·선택 구분, 보유기간, 고지·동의 방식을 검토하고, 민감할 수 있는 정보는 별도 필요성·보호조치를 확인하며 화면·DB·처리방침·운영절차를 일치시킨다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.1.1 개인정보 수집·이용」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 수집·이용 목적별로 처리 근거, 필요한 항목, 필수·선택 구분, 보유기간, 고지·동의 방식을 검토하고, 민감할 수 있는 정보는 별도 필요성·보호조치를 확인하며 화면·DB·처리방침·운영절차를 일치시킨다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.1.1 개인정보 수집·이용 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 1,016자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.1.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-32","conceptId":"long-32-3.1.2","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.1.2 개인정보 수집 제한 · 장문 사례형","q":"위 상황에서 「3.1.2 개인정보 수집 제한」 관점의 조치로 가장 적절한 것은?","p":"AG사는 무료 뉴스레터 가입을 위해 성명, 휴대전화번호, 생년월일, 직업, 관심사, 주소, 소득구간, 추천인 정보를 입력받는 화면을 만들었다. 제품팀은 향후 유료 서비스 전환과 광고 타기팅에 도움이 될 수 있으므로 처음부터 많이 받는 것이 좋다고 설명한다.\n\n가입을 완료하려면 모든 항목을 입력해야 하고, 선택 항목 여부나 입력하지 않았을 때 서비스가 제한되는지에 대한 설명은 없다. 고객센터에는 “무료 뉴스레터에 왜 주소와 소득 정보가 필요한가”라는 문의가 들어오기 시작했다.\n\n마케팅팀은 수집 후 분석에 사용하지 않으면 문제가 없다고 주장했다. 그러나 보안·개인정보 담당자는 처리 목적 달성에 필요한 최소한의 정보만 수집해야 하며, 서비스 이용과 무관한 정보를 필수로 받는 것은 위험하다고 지적했다.\n\n향후 사업 활용 가능성과 현재 서비스 목적 사이의 경계를 명확히 해야 했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「3.1.2 개인정보 수집 제한」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","현재의 구체적 처리 목적 달성에 필요한 최소 정보만 필수항목으로 설계하고, 추가 활용이 필요한 정보는 목적·필요성·선택 여부·거부 시 영향·보유기간을 분명히 하며 불필요한 필수 수집과 포괄적 선수집을 제거한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.1.2 개인정보 수집 제한」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 현재의 구체적 처리 목적 달성에 필요한 최소 정보만 필수항목으로 설계하고, 추가 활용이 필요한 정보는 목적·필요성·선택 여부·거부 시 영향·보유기간을 분명히 하며 불필요한 필수 수집과 포괄적 선수집을 제거한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.1.2 개인정보 수집 제한 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 996자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.1.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-33","conceptId":"long-33-3.1.3","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.1.3 주민등록번호 처리 제한 · 장문 사례형","q":"위 상황에서 「3.1.3 주민등록번호 처리 제한」 관점의 조치로 가장 적절한 것은?","p":"AH사는 본인확인 기능을 개선하면서 회원가입 단계에서 주민등록번호를 직접 입력받아 중복 가입을 확인하는 방안을 검토하고 있다. 기존에는 인증기관의 본인확인 서비스를 이용했지만, 제품팀은 직접 보관하면 비용을 절감하고 가입 절차를 단순화할 수 있다고 본다.\n\n개발사는 주민등록번호를 암호화해 DB에 저장하면 안전하다고 설명했다. 하지만 해당 번호를 직접 처리할 법령상 근거, 대체수단 검토, 보관기간, 접근권한, 암호키 관리, 내부 승인 절차는 정리되지 않았다.\n\n고객지원팀은 회원이 번호 변경·오입력·삭제를 요청할 때 처리 방법도 마련되어 있지 않다고 지적했다. 보안팀은 암호화 여부와 별개로 주민등록번호 처리 자체가 제한되는 점을 검토해야 한다고 보았다.\n\n회사는 부정가입 방지라는 목적을 달성하면서 불필요한 고위험 식별정보 처리를 피하고자 한다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「3.1.3 주민등록번호 처리 제한」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["주민등록번호 처리가 법령상 허용·요구되는지와 대체 본인확인 수단을 우선 검토하고, 직접 처리가 불가피하고 근거가 있는 경우에만 최소 범위·보관기간·접근권한·암호화·키관리·파기·승인을 강화해 제한적으로 운영한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.1.3 주민등록번호 처리 제한」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 주민등록번호 처리가 법령상 허용·요구되는지와 대체 본인확인 수단을 우선 검토하고, 직접 처리가 불가피하고 근거가 있는 경우에만 최소 범위·보관기간·접근권한·암호화·키관리·파기·승인을 강화해 제한적으로 운영한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.1.3 주민등록번호 처리 제한 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 970자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.1.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-34","conceptId":"long-34-3.1.4","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.1.4 민감정보 및 고유식별정보의 처리 제한 · 장문 사례형","q":"위 상황에서 「3.1.4 민감정보 및 고유식별정보의 처리 제한」 관점의 조치로 가장 적절한 것은?","p":"AI사는 운동 코칭 앱에 건강상태, 복용 약물, 장애 관련 정보, 신체 사진을 입력하는 기능을 추가하려 한다. 서비스는 개인별 운동 계획을 제공하지만, 마케팅팀은 이용자 특성에 맞춘 상품 추천에도 같은 정보를 활용하고자 한다.\n\n기획 문서에는 “개인화 서비스”라는 표현만 있고, 항목별 필요성·처리 근거·보호수준·접근자·보유기간·제공 가능성은 구체화되지 않았다. 고객상담 인력과 외주 개발자가 테스트를 위해 해당 정보를 조회할 수 있다는 계획도 포함돼 있다.\n\n개발팀은 일반 개인정보와 동일한 저장소와 권한 체계로 관리하면 된다고 보았다. 그러나 보안팀은 민감정보와 고유식별정보는 처리 필요성과 법적 근거, 강화된 보호조치, 접근 최소화가 중요하다고 지적했다.\n\n서비스 품질을 위해 필요한 정보와 마케팅 편의를 위한 정보의 경계를 분명히 해야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「3.1.4 민감정보 및 고유식별정보의 처리 제한」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","민감정보·고유식별정보는 기능별 필요성·처리 근거·목적·항목·보유기간을 별도로 검토하고, 최소 수집·접근권한 분리·암호화·테스트 반입 제한·제공 및 마케팅 활용 제한·보관·파기 통제를 강화해 제한적으로 처리한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.1.4 민감정보 및 고유식별정보의 처리 제한」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 민감정보·고유식별정보는 기능별 필요성·처리 근거·목적·항목·보유기간을 별도로 검토하고, 최소 수집·접근권한 분리·암호화·테스트 반입 제한·제공 및 마케팅 활용 제한·보관·파기 통제를 강화해 제한적으로 처리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.1.4 민감정보 및 고유식별정보의 처리 제한 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 978자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.1.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-35","conceptId":"long-35-3.1.5","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.1.5 개인정보 간접수집 · 장문 사례형","q":"위 상황에서 「3.1.5 개인정보 간접수집」 관점의 조치로 가장 적절한 것은?","p":"AJ사는 제휴 쇼핑몰로부터 VIP 고객 명단을 받아 공동 프로모션을 진행하려 한다. 제휴사는 고객이 자사의 마케팅 동의 화면에서 제휴 혜택을 선택했다고 설명하지만, A사는 실제 동의 범위와 제공 항목, 수집 시점, 제휴사와의 역할을 확인하지 않았다.\n\n명단에는 성명, 연락처, 구매이력, 관심상품 정보가 포함될 수 있으며, A사는 이를 자사 CRM에 저장해 문자와 앱 알림을 보낼 계획이다. 고객이 A사에 자신의 정보 출처를 문의할 경우 답변 절차나 통지 필요성 검토도 준비되지 않았다.\n\n마케팅팀은 제휴사가 이미 동의를 받았으므로 A사는 별도 검토가 필요 없다고 주장했다. 개인정보 담당자는 제3자로부터 간접 수집한 정보의 출처, 목적, 항목, 처리 근거, 통지 등 요건을 확인해야 한다고 보았다.\n\n프로모션 일정을 지키면서도 수집 경로와 정보주체 권리를 투명하게 관리해야 했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「3.1.5 개인정보 간접수집」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","제휴사로부터 받는 정보의 출처·수집 근거·제공 범위·처리 목적·항목·보유기간·마케팅 활용 가능 여부를 확인하고, 필요한 통지·고지·동의 및 정보주체 문의 대응 절차를 마련한 뒤 검증되지 않은 명단은 수집·활용하지 않는다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.1.5 개인정보 간접수집」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 제휴사로부터 받는 정보의 출처·수집 근거·제공 범위·처리 목적·항목·보유기간·마케팅 활용 가능 여부를 확인하고, 필요한 통지·고지·동의 및 정보주체 문의 대응 절차를 마련한 뒤 검증되지 않은 명단은 수집·활용하지 않는다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.1.5 개인정보 간접수집 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 988자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.1.5","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-36","conceptId":"long-36-3.1.6","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.1.6 영상정보처리기기 설치·운영 · 장문 사례형","q":"위 상황에서 「3.1.6 영상정보처리기기 설치·운영」 관점의 조치로 가장 적절한 것은?","p":"AK사는 매장 도난 방지와 안전관리를 위해 CCTV를 추가 설치하려 한다. 운영팀은 매장 전역을 한 번에 관리하기 위해 계산대, 출입구, 창고뿐 아니라 휴게공간과 직원 탈의 공간 인근까지 촬영 범위를 넓히는 방안을 검토한다.\n\n설치 계획서에는 목적·촬영범위·보관기간·열람 권한·안내판 위치·영상 반출 절차가 구체적이지 않다. 점장은 문제가 생기면 개인 휴대전화로 영상을 촬영해 본사에 보내겠다고 말했고, 외부 유지보수 업체도 원격으로 영상을 볼 수 있다.\n\n직원들은 휴게공간 촬영이 필요한지 의문을 제기했고, 고객은 영상 열람을 요청할 때 어디로 문의해야 하는지 알기 어렵다고 했다. 보안팀은 촬영의 필요성과 장소·범위·접근·보관·파기를 관리해야 한다고 지적했다.\n\n안전 목적을 달성하되 과도한 촬영과 무단 열람을 막아야 했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「3.1.6 영상정보처리기기 설치·운영」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","설치 목적과 필요성을 기준으로 촬영 장소·범위를 최소화하고, 안내·접근권한·열람·반출·보관·파기 절차를 정하며 불필요하거나 사생활 침해 우려가 큰 촬영을 제한하고 유지보수 업체의 접근도 승인·기록·계약으로 통제한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.1.6 영상정보처리기기 설치·운영」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 설치 목적과 필요성을 기준으로 촬영 장소·범위를 최소화하고, 안내·접근권한·열람·반출·보관·파기 절차를 정하며 불필요하거나 사생활 침해 우려가 큰 촬영을 제한하고 유지보수 업체의 접근도 승인·기록·계약으로 통제한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.1.6 영상정보처리기기 설치·운영 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 968자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.1.6","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-37","conceptId":"long-37-3.1.7","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.1.7 홍보 및 마케팅 목적 활용 시 조치 · 장문 사례형","q":"위 상황에서 「3.1.7 홍보 및 마케팅 목적 활용 시 조치」 관점의 조치로 가장 적절한 것은?","p":"AL사는 기존 구매 고객에게 신상품 할인 쿠폰을 문자와 이메일로 보내려 한다. 회원가입 화면에는 서비스 운영에 필요한 알림 수신 항목과 광고성 정보 수신 항목이 한 문장으로 묶여 있고, 수신 동의 여부와 철회 이력이 고객 DB에서 명확히 구분되지 않는다.\n\n마케팅팀은 과거 구매 이력과 앱 사용 기록을 기반으로 세분화된 타기팅을 계획한다. 일부 고객은 광고성 메시지를 거부했지만, 배송 안내와 마케팅 메시지가 같은 발송 시스템에서 처리되어 오발송 가능성이 있다.\n\n고객센터는 수신거부 요청을 수동으로 스프레드시트에 기록하고 있어, 여러 채널에서 즉시 반영되는지 확인하기 어렵다. 개인정보 담당자는 정보주체 의사, 필요한 동의·고지, 거부권과 처리 이력 관리가 필요하다고 설명했다.\n\n매출 목표를 달성하면서도 원치 않는 홍보 활용과 수신거부 미반영을 방지해야 했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「3.1.7 홍보 및 마케팅 목적 활용 시 조치」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","서비스 필수 안내와 홍보·마케팅 목적 활용을 구분하고, 적법한 동의·고지·수신거부·철회 처리와 채널별 반영 이력을 관리하며, 거부 고객에게 광고성 정보가 전송되지 않도록 대상 추출·발송 전 검증·사후 점검을 수행한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.1.7 홍보 및 마케팅 목적 활용 시 조치」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 서비스 필수 안내와 홍보·마케팅 목적 활용을 구분하고, 적법한 동의·고지·수신거부·철회 처리와 채널별 반영 이력을 관리하며, 거부 고객에게 광고성 정보가 전송되지 않도록 대상 추출·발송 전 검증·사후 점검을 수행한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.1.7 홍보 및 마케팅 목적 활용 시 조치 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 995자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.1.7","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-38","conceptId":"long-38-3.2.1","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.2.1 개인정보 현황관리 · 장문 사례형","q":"위 상황에서 「3.2.1 개인정보 현황관리」 관점의 조치로 가장 적절한 것은?","p":"AM사는 여러 사업부가 고객정보를 각기 다른 CRM, 설문 도구, 파일 서버, 콜센터 시스템, 데이터 분석 플랫폼에 저장하고 있다. 개인정보 처리방침에는 주요 서비스만 적혀 있고, 실제 시스템·파일·항목·보유기간·제공·위탁 현황과 일치하는지 정기적으로 확인하지 않았다.\n\n정보주체의 삭제 요청이 접수되자 담당자는 운영 DB만 확인하고 백업, 분석용 데이터마트, 테스트 파일, 외부 상담 시스템에 남은 정보를 바로 찾지 못했다. 신규 분석 도구 도입과 외주 변경도 개인정보 현황표에 반영되지 않았다.\n\n각 부서는 자신이 보유한 정보만 알고 있어, 전사적인 데이터 흐름과 보유 현황을 설명하기 어렵다. 감사팀은 현황이 부정확하면 파기·권리보장·위탁·국외이전·침해사고 대응도 불완전해질 수 있다고 지적했다.\n\n모든 부서의 업무를 중단하지 않고도 개인정보 처리현황을 지속적으로 최신화해야 했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「3.2.1 개인정보 현황관리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["개인정보처리 시스템·파일·항목·목적·보유기간·접근자·제공·위탁·국외이전·백업·테스트 현황을 전사적으로 식별하고, 신규 도입·변경·종료·권리요청 시 갱신되는 관리체계와 책임자를 운영한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.2.1 개인정보 현황관리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 개인정보처리 시스템·파일·항목·목적·보유기간·접근자·제공·위탁·국외이전·백업·테스트 현황을 전사적으로 식별하고, 신규 도입·변경·종료·권리요청 시 갱신되는 관리체계와 책임자를 운영한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.2.1 개인정보 현황관리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 988자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.2.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-39","conceptId":"long-39-3.2.3","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.2.3 이용자 단말기 접근 보호 · 장문 사례형","q":"위 상황에서 「3.2.3 이용자 단말기 접근 보호」 관점의 조치로 가장 적절한 것은?","p":"AN사는 모바일 앱에서 주문 내역과 배송지를 표시하고, 사용 편의를 위해 로그인 상태를 장기간 유지한다. 앱은 고객 정보를 로컬 저장소에 캐시하고, 고객센터 채팅 화면에는 이전 상담 내용 일부가 미리 표시된다.\n\n모바일 보안 점검에서 루팅·탈옥 단말기에서 앱 데이터가 추출될 가능성, 화면 캡처·백그라운드 노출, 인증 토큰 장기 보관, 암호화되지 않은 로컬 로그 문제가 발견됐다. 개발팀은 서버 통신이 암호화되어 있으므로 단말기 보호는 우선순위가 낮다고 보았다.\n\n고객이 공용 기기나 분실된 단말기에서 로그아웃하지 않은 경우에도 주문·상담 정보가 노출될 수 있다. 또한 앱 업데이트 과정에서 과거 버전의 취약점이 계속 사용될 가능성도 있다.\n\n이용 편의성을 지나치게 해치지 않으면서 단말기에서의 개인정보 노출·탈취 위험을 낮춰야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「3.2.3 이용자 단말기 접근 보호」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","단말기 저장 데이터·세션·인증토큰·로컬 로그·화면표시·전송을 보호하도록 최소 저장·암호화·안전한 세션 종료·민감 화면 보호·루팅 등 위험 단말 대응·버전 관리와 취약점 점검을 적용하고, 서버 통신 보안만으로 충분하다고 보지 않는다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.2.3 이용자 단말기 접근 보호」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 단말기 저장 데이터·세션·인증토큰·로컬 로그·화면표시·전송을 보호하도록 최소 저장·암호화·안전한 세션 종료·민감 화면 보호·루팅 등 위험 단말 대응·버전 관리와 취약점 점검을 적용하고, 서버 통신 보안만으로 충분하다고 보지 않는다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.2.3 이용자 단말기 접근 보호 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 963자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.2.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-40","conceptId":"long-40-3.2.4","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.2.4 개인정보 목적 외 이용 및 제공 · 장문 사례형","q":"위 상황에서 「3.2.4 개인정보 목적 외 이용 및 제공」 관점의 조치로 가장 적절한 것은?","p":"AO사는 고객이 회원가입할 때 수집한 연락처와 구매이력을 기반으로 내부 연구팀이 이탈 예측 모델을 만들고, 제휴 금융사가 고객에게 신용상품을 제안할 수 있도록 정보를 전달하는 방안을 검토한다. 초기 수집 목적은 상품 판매와 배송·고객지원이었다.\n\n사업부는 모두 회사 성장에 도움이 되는 업무이므로 내부 이용과 외부 제공을 같은 절차로 처리하자고 제안했다. 담당자는 제휴사의 요청 메일만 보관하면 충분하다고 했고, 어떤 정보가 누구에게 어떤 근거로 전달되는지 기록할 체계도 없다.\n\n개인정보 담당자는 내부 연구와 제3자 제공의 성격이 다르고, 원래 목적 외 이용·제공은 법적 근거·절차·기록·제한을 확인해야 한다고 지적했다. 고객이 이 사실을 알았는지, 거부할 기회가 있는지, 전달 후 안전조치를 어떻게 보장할지도 미정이었다.\n\n혁신 업무를 무조건 막지 않되, 목적 외 이용·제공의 예외 요건을 엄격히 관리해야 했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「3.2.4 개인정보 목적 외 이용 및 제공」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","원래 수집 목적과 비교하여 내부 이용·제3자 제공을 구분하고, 목적 외 처리의 법적 근거·필요성·정보 범위·수령자·안전조치·고지 또는 동의·기록·사후 점검을 검토하며 근거 없는 전달이나 포괄적 활용을 제한한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.2.4 개인정보 목적 외 이용 및 제공」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 원래 수집 목적과 비교하여 내부 이용·제3자 제공을 구분하고, 목적 외 처리의 법적 근거·필요성·정보 범위·수령자·안전조치·고지 또는 동의·기록·사후 점검을 검토하며 근거 없는 전달이나 포괄적 활용을 제한한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.2.4 개인정보 목적 외 이용 및 제공 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 1,015자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.2.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-41","conceptId":"long-41-3.2.5","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.2.5 가명정보 처리 · 장문 사례형","q":"위 상황에서 「3.2.5 가명정보 처리」 관점의 조치로 가장 적절한 것은?","p":"AP사는 고객 구매이력과 앱 사용기록을 분석해 상품 추천 모델을 개선하려 한다. 데이터 분석팀은 이름과 연락처를 제거하면 자유롭게 활용할 수 있다고 보고, 원본 데이터와 연결 가능한 고객번호를 그대로 남긴 데이터셋을 여러 분석가에게 배포하려 한다.\n\n추가정보와 가명처리 데이터는 같은 클라우드 프로젝트에 저장되고, 분석 결과를 외부 컨설팅사에 전달하는 방안도 논의 중이다. 분석가는 고객 문의에 대응하기 위해 언제든 원본을 다시 연결할 수 있어야 한다고 주장한다.\n\n데이터셋의 처리 목적·적정성·접근자·결합 여부·반출 절차·재식별 위험 평가·파기 기준이 문서화되어 있지 않다. 개인정보 담당자는 단순 식별자 삭제만으로 가명정보 처리의 요건을 충족한다고 보기 어렵다고 지적했다.\n\n분석 효용을 유지하면서 추가정보 분리와 재식별 위험 통제를 설계해야 했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「3.2.5 가명정보 처리」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","가명정보 처리 목적과 적정성을 명확히 하고, 추가정보를 분리·보호하며 접근권한·반출·결합·재식별 금지·위험 점검·처리기록·종료 후 파기 기준을 관리하고, 원본 재연결 필요성은 최소화된 절차와 승인으로 통제한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.2.5 가명정보 처리」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 가명정보 처리 목적과 적정성을 명확히 하고, 추가정보를 분리·보호하며 접근권한·반출·결합·재식별 금지·위험 점검·처리기록·종료 후 파기 기준을 관리하고, 원본 재연결 필요성은 최소화된 절차와 승인으로 통제한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.2.5 가명정보 처리 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 975자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.2.5","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-42","conceptId":"long-42-3.3.1","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.3.1 개인정보 제3자 제공 · 장문 사례형","q":"위 상황에서 「3.3.1 개인정보 제3자 제공」 관점의 조치로 가장 적절한 것은?","p":"AQ사는 여행 예약 고객에게 제휴 보험을 소개하기 위해 고객 성명, 연락처, 여행 일정, 동반자 수를 보험사에 전달하려 한다. 보험사는 상담을 위해 고객의 이전 여행 취소 이력도 함께 제공해 달라고 요청했다.\n\n사업부는 보험사가 실제 상품을 제공하므로 “업무위탁”으로 처리하면 된다고 생각한다. 그러나 보험사는 자신이 상품 제안·심사·계약 체결을 위해 정보를 독자적으로 활용할 계획이고, A사는 제공 후의 처리 목적과 보유기간을 직접 통제하지 않는다.\n\n고객에게 누구에게 어떤 항목이 어떤 목적으로 제공되는지 알려주는 화면과 제공 이력 관리가 불명확하다. 마케팅팀은 한 번의 포괄 동의로 모든 제휴사 제공을 처리하자고 제안했다.\n\n제휴 수익을 확보하면서도 위탁과 제3자 제공의 구분, 제공 근거와 정보주체 권리를 명확히 해야 했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「3.3.1 개인정보 제3자 제공」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","수령자가 독자적 목적과 책임으로 정보를 활용하는지 확인하여 제3자 제공 여부를 판단하고, 제공의 법적 근거·수령자·목적·항목·보유기간·안전조치·고지·동의·제공 이력을 관리하며 불필요한 항목이나 포괄적 제공을 제한한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.3.1 개인정보 제3자 제공」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 수령자가 독자적 목적과 책임으로 정보를 활용하는지 확인하여 제3자 제공 여부를 판단하고, 제공의 법적 근거·수령자·목적·항목·보유기간·안전조치·고지·동의·제공 이력을 관리하며 불필요한 항목이나 포괄적 제공을 제한한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.3.1 개인정보 제3자 제공 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 969자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.3.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-43","conceptId":"long-43-3.3.2","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.3.2 개인정보 처리 업무 위탁 · 장문 사례형","q":"위 상황에서 「3.3.2 개인정보 처리 업무 위탁」 관점의 조치로 가장 적절한 것은?","p":"AR사는 고객센터 운영과 문자발송을 별도 업체에 맡기고 있다. 수탁업체는 고객 문의·주문 상태·연락처를 처리하며, 성수기에는 다른 하청업체 인력을 투입해 업무를 분담한다.\n\n계약서에는 업무 범위와 비용만 있고, 목적 외 처리 금지, 보호조치, 재위탁 조건, 접근 제한, 관리현황 점검, 손해배상 책임, 계약 종료 시 반환·파기 내용이 충분히 반영되지 않았다. 본사는 수탁자 명단을 처리방침에 반영하는 절차도 일관되지 않다.\n\n수탁업체는 하청업체 사용이 단순 인력운영이라고 설명했지만, 실제로는 개인정보에 접근할 수 있다. 본사는 누가 접근하는지, 어느 시스템을 사용하는지, 계약 종료 후 데이터가 남지 않는지 확인하기 어렵다.\n\n외주 운영을 지속하면서도 위탁자 책임과 수탁자 관리 의무를 실질적으로 이행해야 했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「3.3.2 개인정보 처리 업무 위탁」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["위탁업무의 목적·범위와 수탁자·재위탁자의 접근을 식별하고, 목적 외 처리 금지·보호조치·재위탁 승인·접근 제한·점검·책임·종료 시 반환·파기를 계약과 운영절차에 반영하며 수탁자 이행 상태를 정기적으로 확인한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.3.2 개인정보 처리 업무 위탁」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 위탁업무의 목적·범위와 수탁자·재위탁자의 접근을 식별하고, 목적 외 처리 금지·보호조치·재위탁 승인·접근 제한·점검·책임·종료 시 반환·파기를 계약과 운영절차에 반영하며 수탁자 이행 상태를 정기적으로 확인한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.3.2 개인정보 처리 업무 위탁 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 951자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.3.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-44","conceptId":"long-44-3.3.3","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.3.3 영업의 양도 등에 따른 개인정보 이전 · 장문 사례형","q":"위 상황에서 「3.3.3 영업의 양도 등에 따른 개인정보 이전」 관점의 조치로 가장 적절한 것은?","p":"AS사는 적자 사업부의 온라인 쇼핑몰을 다른 회사에 양도하려 한다. 양수 회사는 회원정보, 주문이력, 적립금, 고객문의 기록, 마케팅 수신 동의 이력을 함께 받아 기존 서비스를 이어갈 계획이다.\n\n매각 담당자는 계약서에 “고객 DB 일체 이전”이라고만 적으면 된다고 생각한다. 그러나 이전 대상·시점·방법·양수인 정보·고객 고지·이전 후 보유와 활용 범위·보안조치가 구체적이지 않고, 양수인이 기존의 수신동의 상태를 어떻게 처리할지도 불명확하다.\n\n고객센터는 양도 사실을 모르는 고객 문의가 늘 수 있다고 우려했다. 보안팀은 영업 양도·합병 등으로 개인정보가 이전되는 경우 정보주체가 관련 사실을 알 수 있도록 하고, 이전 과정과 이후 보호조치를 관리해야 한다고 지적했다.\n\n거래 일정과 고객 신뢰를 모두 고려해 이전 계획을 투명하게 설계해야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「3.3.3 영업의 양도 등에 따른 개인정보 이전」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","이전 대상 개인정보·양수인·이전 시점·방법·목적·보호조치와 정보주체 고지 사항을 정리하고, 이전 전후 접근권한·전송·검증·기록·고객 문의 대응을 관리하며 양수인의 처리 목적, 안전조치, 보유·파기 체계를 확인한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.3.3 영업의 양도 등에 따른 개인정보 이전」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 이전 대상 개인정보·양수인·이전 시점·방법·목적·보호조치와 정보주체 고지 사항을 정리하고, 이전 전후 접근권한·전송·검증·기록·고객 문의 대응을 관리하며 양수인의 처리 목적, 안전조치, 보유·파기 체계를 확인한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.3.3 영업의 양도 등에 따른 개인정보 이전 · 개인정보 보호법 제27조 · 개인정보 보호법 시행령 제29조","u":"https://www.law.go.kr/LSW//lsSideInfoP.do?docCls=jo&joBrNo=00&joNo=0029&lsiSeq=286175&urlMode=lsScJoRltInfoR","v":"2026년 6월 법령 정합성 검토: 영업양도 통지와 광고성 정보 수신동의를 구분","controlCode":"3.3.3","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-45","conceptId":"long-45-3.3.4","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.3.4 개인정보의 국외이전 · 장문 사례형","q":"위 상황에서 「3.3.4 개인정보의 국외이전」 관점의 조치로 가장 적절한 것은?","p":"AT사는 고객지원 티켓 시스템과 분석 플랫폼을 해외 SaaS로 전환하려 한다. 서비스 제공자는 해외 여러 국가의 데이터센터와 원격지원 인력을 활용할 수 있다고 안내했으며, 고객 문의에는 이름·연락처·주문 정보·상담 내용이 포함될 수 있다.\n\n제품팀은 “클라우드에 저장되는 것일 뿐 제3자 제공은 아니다”라고 설명하며, 해외 이전 여부와 이전 유형·수령자·국가·목적·항목·보유기간·안전조치·적용 요건을 별도로 검토하지 않았다. 계약서에는 데이터 처리 위치가 변경될 수 있다는 일반 문구만 있다.\n\n개인정보처리방침과 고객 동의 화면에는 해외 SaaS 사용 사실이 구체적으로 반영되지 않았고, 해외 사업자의 재위탁·접근 통제·사고 통지·종료 시 데이터 회수 조건도 명확하지 않았다.\n\n글로벌 도구의 장점을 활용하되, 국외이전 관련 요건과 고객의 알 권리를 충족해야 했다.\n\n내부 회의에서는 단기적인 편의보다 위험의 원인과 영향 범위를 먼저 확인해야 한다는 결론이 나왔다. 조치는 업무 중요도와 개인정보·거래정보 영향, 외부 연계와 법적·계약상 요구사항을 함께 고려해 우선순위를 정하고, 잔여위험은 적정 권한자가 검토·승인해야 한다.\n\n 이 사안은 「3.3.4 개인정보의 국외이전」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","국외이전 여부와 유형을 사실관계에 따라 판단하고, 수령자·국가·목적·항목·보유기간·이전 방식·안전조치·계약·고지·동의 등 적용 요건을 검토하며 재위탁·접근기록·사고통지·종료 시 반환·파기까지 관리한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.3.4 개인정보의 국외이전」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 국외이전 여부와 유형을 사실관계에 따라 판단하고, 수령자·국가·목적·항목·보유기간·이전 방식·안전조치·계약·고지·동의 등 적용 요건을 검토하며 재위탁·접근기록·사고통지·종료 시 반환·파기까지 관리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.3.4 개인정보의 국외이전 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 980자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.3.4","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-46","conceptId":"long-46-3.4.1","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.4.1 개인정보의 파기 · 장문 사례형","q":"위 상황에서 「3.4.1 개인정보의 파기」 관점의 조치로 가장 적절한 것은?","p":"AU사는 회원 탈퇴가 완료되면 앱 화면에서 고객 정보가 보이지 않도록 처리한다. 그러나 운영 DB의 이력 테이블, 백업, 분석용 데이터마트, 테스트 파일, 고객센터 첨부파일에는 일부 정보가 계속 남아 있을 수 있다.\n\n개발팀은 백업 데이터는 복구용이므로 파기 대상이 아니고, 테스트 파일은 나중에 오류 분석에 쓸 수 있으니 보관하자고 제안했다. 보유기간이 끝난 데이터의 목록, 파기 방법, 복구 가능성, 파기 결과 확인 기록은 시스템별로 다르거나 존재하지 않는다.\n\n고객이 삭제를 요청하면 운영 화면만 처리되고, 외부 수탁자와 분석 도구에 남은 사본을 확인하는 절차도 불명확하다. 보안팀은 목적 달성·보유기간 경과 시 복구되지 않도록 안전하게 파기하고, 예외 보유는 근거와 통제가 필요하다고 보았다.\n\n서비스 분석과 법적 보관 필요성을 고려하면서도 불필요한 보유를 줄여야 했다.\n\n보안총괄책임자는 단순히 문서를 보완하는 방식이 아니라, 실제 운영에서 책임자·승인·기록·점검·후속조치가 연결되어야 심사와 사고 대응 모두에 활용할 수 있다고 설명했다. 아직 확인되지 않은 사실은 추정으로 단정하지 않고, 조사 범위와 판단 근거를 구분해 남기기로 했다.\n\n 이 사안은 「3.4.1 개인정보의 파기」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["문서의 문구만 수정하고 실제 권한·설정·계약·운영 절차는 다음 정기점검 때까지 유지한다.","일정 지연을 피하기 위해 담당자의 구두 판단으로 예외를 무기한 적용하고 승인·점검 기록은 남기지 않는다.","문제가 발생한 시스템 또는 화면만 임시로 차단하고 외부자·백업·연계 경로의 영향은 확인하지 않는다.","모든 부서와 시스템에 동일한 조치를 일괄 적용하되 업무 필요성·법적 근거·대체통제·잔여위험은 검토하지 않는다.","개인정보가 존재하는 운영·백업·분석·테스트·수탁자 환경을 식별하고, 목적 달성·보유기간 경과 시 안전한 파기 방법과 확인 절차를 적용하며, 예외 보유는 근거·기간·분리보관·접근제한을 기록하고 사본까지 관리한다."],"a":4,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.4.1 개인정보의 파기」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 개인정보가 존재하는 운영·백업·분석·테스트·수탁자 환경을 식별하고, 목적 달성·보유기간 경과 시 안전한 파기 방법과 확인 절차를 적용하며, 예외 보유는 근거·기간·분리보관·접근제한을 기록하고 사본까지 관리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.4.1 개인정보의 파기 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 990자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.4.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-47","conceptId":"long-47-3.4.2","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.4.2 처리목적 달성 후 보유 시 조치 · 장문 사례형","q":"위 상황에서 「3.4.2 처리목적 달성 후 보유 시 조치」 관점의 조치로 가장 적절한 것은?","p":"AV사는 계약이 종료된 고객의 거래기록 일부를 분쟁 대응과 법적 보관 필요성 때문에 계속 보유하려 한다. 운영팀은 기존 고객 DB에 그대로 두면 조회가 편하다고 보았고, 마케팅팀은 보유 중인 고객에게 재가입 안내를 보내자는 의견을 냈다.\n\n보유 근거·대상·보유기간·접근자·사용 가능 범위가 정리되지 않아, 계약 종료 고객 정보가 일반 운영·마케팅 화면에서 현 고객 정보와 동일하게 조회된다. 일부 직원은 “삭제하지 않았으니 다른 용도로도 쓸 수 있다”고 이해한다.\n\n개인정보 담당자는 목적 달성 후 법령상 또는 정당한 사유로 보유하는 경우에도 별도 관리가 필요하며, 본래 목적과 무관한 활용은 제한되어야 한다고 지적했다. 파기 예정 시점과 분리보관 상태를 점검하는 절차도 없었다.\n\n분쟁 대응에 필요한 기록은 지키되, 장기 보유로 인한 오남용·유출 위험을 낮춰야 했다.\n\n관련 부서는 일정과 비용을 이유로 최소 조치만 하자는 의견과, 위험·법적 요구사항·고객 영향까지 함께 보아야 한다는 의견으로 나뉘었다. A사는 조치의 필요성, 예외 여부, 책임자, 완료 기준과 재검토 시점을 남겨야 이후 변경이나 사고에서도 동일한 기준을 적용할 수 있다.\n\n 이 사안은 「3.4.2 처리목적 달성 후 보유 시 조치」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["현재 서비스가 정상 동작하므로 사고나 민원이 실제로 발생한 뒤에만 원인을 조사한다.","담당 부서의 경험을 신뢰하고, 관련 자산·데이터·외부 연계 현황을 별도로 식별하지 않는다.","목적 달성 후에도 관련 법령 등에 따라 보존해야 하는 데이터는 보존 근거·대상·보유기간·사용 범위를 식별하고, 해당 목적에 필요한 최소한의 항목만 다른 개인정보와 분리하여 저장·관리하며, 목적 외 재이용을 제한하고 보유기간 종료 시 파기되도록 점검·기록한다.","위험한 항목을 삭제하거나 재시작한 뒤 로그·설정·계약·승인 기록은 보관하지 않는다.","개선 필요사항은 회의에서 공유만 하고 책임자·기한·완료기준·재검토 절차는 정하지 않는다."],"a":2,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.4.2 처리목적 달성 후 보유 시 조치」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 목적 달성 후에도 관련 법령 등에 따라 보존해야 하는 데이터는 보존 근거·대상·보유기간·사용 범위를 식별하고, 해당 목적에 필요한 최소한의 항목만 다른 개인정보와 분리하여 저장·관리하며, 목적 외 재이용을 제한하고 보유기간 종료 시 파기되도록 점검·기록한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.4.2 처리목적 달성 후 보유 시 조치 · 개인정보 보호법 제21조 · 표준 개인정보 보호지침 제11조","u":"https://www.law.go.kr/LSW//lsLinkCommonInfo.do?ancYnChk=&chrClsCd=010202&lsJoLnkSeq=1020398651","v":"2026년 6월 법령 정합성 검토: 보존 근거·최소 항목·분리 저장 관리 명확화","controlCode":"3.4.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-48","conceptId":"long-48-3.5.1","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.5.1 개인정보 처리방침 공개 · 장문 사례형","q":"위 상황에서 「3.5.1 개인정보 처리방침 공개」 관점의 조치로 가장 적절한 것은?","p":"AW사는 신규 추천 기능, 외부 분석 도구, 해외 고객지원 SaaS, 문자발송 수탁자를 도입했지만 개인정보처리방침은 2년 전 내용 그대로다. 방침에는 과거 서비스의 수집 항목과 수탁자만 적혀 있고, 실제 앱 화면과 고객센터 안내도 서로 다르다.\n\n제품팀은 기능 출시 후 한 번에 방침을 업데이트하면 된다고 생각한다. 고객이 자신의 정보가 어떤 목적으로 처리되고 누구에게 제공·위탁되는지, 보유기간과 권리행사 방법을 찾으려 해도 안내 문구가 복잡하거나 오래된 페이지로 연결된다.\n\n개인정보 담당자는 처리방침은 형식적 문서가 아니라 실제 처리현황과 일치하고 이용자가 알기 쉽게 접근할 수 있어야 한다고 지적했다. 변경이 필요한 항목을 누가 검토·승인·게시·이력관리하는지도 불분명했다.\n\n서비스 변경 속도를 따라가면서도 공개 정보의 정확성과 이해 가능성을 확보해야 했다.\n\n현재까지 명확히 확인된 사실과 추가 조사가 필요한 사실이 섞여 있어, 담당자는 단순한 관행이나 구두 판단에 의존하지 않기로 했다. 특히 외부자·백업·분석 도구·연계 시스템처럼 본 서비스 화면에서 보이지 않는 처리 경로도 함께 확인 대상에 포함해야 한다.\n\n 이 사안은 「3.5.1 개인정보 처리방침 공개」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["실제 수집·이용·보유·제공·위탁·국외이전·권리행사·책임자 등 처리현황을 기준으로 처리방침을 최신화하고, 변경 검토·승인·게시·이력관리 절차를 운영하며 이용자가 쉽게 확인할 수 있는 위치와 표현으로 공개한다.","기존 방식이 오래 사용되었으므로 최근의 조직·기술·법령·계약 변경 여부를 검토하지 않는다.","우선 사업 일정에 맞춰 데이터를 넓게 활용한 뒤, 고객 문의가 생기면 개별적으로 설명한다.","관리 편의를 위해 공용 계정·포괄 권한·공개 저장소를 계속 사용하고 사용기록은 필요한 경우에만 확인한다.","외부 사업자 또는 수탁자가 관여한 경우 본사의 관리 대상이 아니라고 보고 계약·점검·종료 절차를 생략한다."],"a":0,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.5.1 개인정보 처리방침 공개」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 실제 수집·이용·보유·제공·위탁·국외이전·권리행사·책임자 등 처리현황을 기준으로 처리방침을 최신화하고, 변경 검토·승인·게시·이력관리 절차를 운영하며 이용자가 쉽게 확인할 수 있는 위치와 표현으로 공개한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.5.1 개인정보 처리방침 공개 · ISMS-P 인증기준 안내서(2023.11) 및 세부점검항목(2023.10.31) · 개인정보 보호법 및 하위규정(국가법령정보센터 원문 확인)","u":"https://www.law.go.kr/LSW/unSc.do?query=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4%20%EB%B3%B4%ED%98%B8%EB%B2%95","v":"장문 사례형 문항 검토 · 공백 포함 지문 979자 · 통제목적·주요 확인사항·법령 원문 대조","controlCode":"3.5.1","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-49","conceptId":"long-49-3.5.2","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.5.2 정보주체 권리보장 · 장문 사례형","q":"위 상황에서 「3.5.2 정보주체 권리보장」 관점의 조치로 가장 적절한 것은?","p":"AX사는 고객이 앱과 고객센터를 통해 자신의 개인정보 열람, 정정, 삭제, 처리정지를 요청할 수 있다고 안내한다. 그러나 실제로는 요청이 이메일·전화·챗봇에 흩어져 접수되고, 본인확인 기준과 처리 담당 부서, 처리기한 관리, 결과 통지 방식이 일관되지 않다.\n\n한 고객은 배송지와 결제수단 삭제를 요청했지만, 상담원은 운영 DB에서만 삭제하고 외부 결제·배송 수탁자와 백업·분석 시스템의 반영 여부를 확인하지 않았다. 다른 고객의 열람 요청은 담당자 휴가로 누락되어 장기간 답변이 지연됐다.\n\n사업부는 권리요청이 많지 않으므로 수동 처리로 충분하다고 보았다. 개인정보 담당자는 정보주체 권리행사 절차, 본인확인, 예외 판단, 관련 시스템·수탁자 연계, 처리 결과와 통지 기록을 관리해야 한다고 지적했다.\n\n부정 요청을 막으면서도 정당한 권리행사가 누락·지연되지 않도록 해야 했다.\n\n경영진은 서비스 안정성과 고객 신뢰를 동시에 지키는 대안을 요청했다. 따라서 각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 승인 기록, 설정값, 점검 결과, 계약 또는 처리대장 등 객관적 증적을 남기고, 미흡사항은 완료 여부까지 추적해야 한다.\n\n 이 사안은 「3.5.2 정보주체 권리보장」과 관련하여 단일 부서의 업무 문제가 아니라 관리체계의 책임·절차·기술적 설정·증적·사후 검토가 함께 작동하는지를 판단해야 하는 사례이다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.\n\n 이 과정에서 대상 자산·데이터·계정·외부 연계와 책임자를 명확히 하고, 조치 전후의 설정·승인·점검 결과를 확인할 수 있어야 한다. 또한 예외가 필요한 경우에는 업무상 필요성, 대체통제, 적용 기간, 잔여위험과 승인권자를 분리해 기록하고 재검토 시점을 정해야 한다.","longPassage":true,"o":["모든 문제를 차기 예산 편성 때까지 보류하고, 그 사이에는 현재 상태를 위험수용으로 간주한다.","기술적 조치 하나만 적용하면 충분하다고 보고 인력·절차·계약·교육·로그 등 다른 통제는 검토하지 않는다.","영향을 줄이기 위해 관련 기록을 즉시 삭제하고, 나중에 필요하면 담당자의 기억으로 상황을 재구성한다.","권리행사 접수 채널·본인확인·담당·처리기한·예외 판단·관련 시스템과 수탁자 반영·결과 통지·처리대장을 표준화하고, 요청이 누락되지 않도록 추적하며 정당한 요청은 실제 데이터 보유 위치와 수탁자 처리 범위를 확인해 처리한다. 백업 등 기술적 제약이 있는 경우에는 적용 법령과 내부 파기·접근제한 절차에 따라 별도로 관리한다.","정보주체·외부자·연계 서비스의 영향은 담당 부서의 업무 범위 밖이라는 이유로 조사 대상에서 제외한다."],"a":3,"e":"정답은 통제목적에 맞추어 사실관계·영향·책임·기록·사후 확인을 연결한 조치이다. 「3.5.2 정보주체 권리보장」에서는 단순한 문서 보관이나 일회성 조치가 아니라, 권리행사 접수 채널·본인확인·담당·처리기한·예외 판단·관련 시스템과 수탁자 반영·결과 통지·처리대장을 표준화하고, 요청이 누락되지 않도록 추적하며 정당한 요청은 실제 데이터 보유 위치와 수탁자 처리 범위를 확인해 처리한다. 백업 등 기술적 제약이 있는 경우에는 적용 법령과 내부 파기·접근제한 절차에 따라 별도로 관리한다. 다른 보기는 증거보전·권한·계약·법적 검토·효과 검증 중 핵심 요소를 누락하거나, 포괄적·무기한 예외를 허용한다.","b":"ISMS-P 인증기준 3.5.2 정보주체 권리보장 · 개인정보 보호법 제35조~제37조 · 개인정보 보호법 시행령 제43조","u":"https://www.law.go.kr/LSW//lsSideInfoP.do?docCls=jo&joBrNo=00&joNo=0043&lsiSeq=286175&urlMode=lsScJoRltInfoR","v":"2026년 6월 법령 정합성 검토: 권리행사와 백업 등 기술적 제약의 처리 원칙 명확화","controlCode":"3.5.2","contentReview":"2026년 6월 기준 학습용 시나리오 재검토"},{"id":"H-50","conceptId":"long-50-3.5.3","difficulty":"상","area":"개인정보 처리단계별 요구사항","tag":"3.5.3 정보주체에 대한 통지 · 장문 사례형","q":"위 상황에서 「3.5.3 정보주체에 대한 통지」 관점의 조치로 가장 적절한 것은?","p":"AY사는 온라인 쇼핑·멤버십 서비스를 운영하며, 전년도 말 기준 직전 3개월 동안 일일 평균 약 120만 명의 고객 개인정보를 처리한다. 서비스 이용 과정에서 주문·결제·배송·고객상담 정보가 수집되고, 일부 정보는 제휴 배송사와 결제대행사에 제공된다. 고객은 웹과 앱에서 자신의 주문 내역은 볼 수 있지만, 개인정보가 어떤 목적으로 이용되었고 어느 제3자에게 제공되었는지를 한 번에 확인하기 어렵다.\n\n운영팀은 개인정보처리방침에 수집·이용·제공 내용을 게시했으므로 별도의 안내는 불필요하다고 보았다. 마케팅팀은 뉴스레터 발송 동의를 받은 고객에게만 안내하면 된다고 생각했다. 그러나 개인정보 담당자는 일정 규모 이상의 개인정보처리자는 개인정보 이용·제공 내역 또는 그 내역을 확인할 수 있는 방법을 정보주체에게 주기적으로 알려야 할 수 있으며, 통지 의무 대상 여부·통지 대상·예외·항목·방법을 구분해야 한다고 설명했다.\n\nA사는 통지 대상 산정에 필요한 전년도 처리 규모를 문서화하지 않았고, 통지 여부를 검토한 회의록도 없었다. 과거에는 앱 공지사항에 공통 메시지를 올린 뒤 개별 고객에게 알린 것으로 처리했으며, 실제 발송 성공 여부나 통지 사실·시기·방법을 보관하지 않았다.\n\n서비스 개편으로 제휴사와 제공 항목이 바뀌었지만, 통지 기준과 템플릿은 갱신되지 않았다. 고객지원 부서는 “고객이 요청하면 그때 답변하면 된다”고 보았고, 정보보호 부서는 법적 의무와 고객의 알 권리를 함께 충족하는 표준 절차가 필요하다고 보았다.\n\n이 사안에서는 처리 규모, 민감정보·고유식별정보 처리 여부, 통지 제외 대상, 통지 항목과 방법을 확인하고, 전사적으로 일관된 기준·증적·사후 점검을 갖추는 것이 중요하다.\n\n각 부서는 조치가 실제로 이행되었음을 보여 줄 수 있는 산정 자료, 승인 기록, 발송 결과, 오류 조치와 재검토 기록을 남기고, 서비스·처리 현황이 바뀌면 통지 절차도 최신화해야 한다.\n\n이 과정에서 법정 의무 대상 여부와 예외를 정확히 판단하되, 단순 홈페이지 게시만으로 개별 통지 의무를 대체할 수 있는지 여부는 법령의 요건에 따라 검토해야 한다.","longPassage":true,"o":["점검 결과를 파일로만 보관하고 실제 이행 여부나 조치 효과는 확인하지 않는다.","전년도 말 기준 직전 3개월간 일일 평균 처리 규모와 민감정보·고유식별정보 처리 여부를 기준으로 통지 의무 대상 여부를 산정하고, 대상 정보주체·예외·통지 항목·연 1회 이상 통지 방법을 검토한다. 의무 대상이면 개인정보 이용·제공 내역 또는 그 내역을 확인할 수 있는 정보시스템에 접속하는 방법을 정보주체가 쉽게 확인할 수 있도록 통지하고, 통지 사실·시기·방법과 오류 조치 기록을 보관·갱신한다.","처리 목적·근거·보유기간·수신자 구분 없이 하나의 포괄적 동의 또는 계약 문구로 모든 처리를 정당화한다.","장애 대응을 위해 필요하다는 이유로 관리자 권한·원본 데이터·외부 접근을 상시 허용한다.","문제의 원인을 분석하지 않고 같은 문제가 반복될 때마다 담당자를 교체하는 방식으로 대응한다."],"a":1,"e":"「3.5.3 정보주체에 대한 통지」는 법적 의무 대상에 해당하는 개인정보처리자가 개인정보 이용·제공 내역 또는 이를 확인할 수 있는 방법을 정보주체에게 주기적으로 통지하고 관련 기록을 관리하는지 확인하는 항목이다. 개인정보처리방침 공개나 공지사항 게시만으로 개별 통지 의무가 당연히 대체되는 것은 아니므로, 통지 대상·예외·항목·방법 및 기록 보관 요건을 구분하여 운영해야 한다.","b":"ISMS-P 인증기준 3.5.3 정보주체에 대한 통지 · 개인정보 보호법 제20조의2 · 개인정보 보호법 시행령 제15조의3","u":"https://www.law.go.kr/LSW//lsLinkCommonInfo.do?ancYnChk=&chrClsCd=010202&lspttninfSeq=182187","v":"장문 사례형 문항 정밀 검토 · 2026년 6월 기준 · 이용·제공 내역 통지의 대상·예외·주기·기록 요건 대조","controlCode":"3.5.3","contentReview":"2026년 6월 기준 법령·인증기준 정밀 검토 완료"}];

let gateMemoryState = {failures:0,locked:false};

function loadGateState(){
  try{
    const raw=localStorage.getItem(ACCESS_GATE.storageKey);
    if(!raw) return {...gateMemoryState};

    const failures=Math.max(0,Math.min(ACCESS_GATE.maxFailures,Number(parsed?.failures)||0));
    return {failures,locked:Boolean(parsed?.locked)||failures>=ACCESS_GATE.maxFailures};
  }catch(e){return {...gateMemoryState};}
}
function saveGateState(next){
  gateMemoryState={failures:Math.max(0,Math.min(ACCESS_GATE.maxFailures,Number(next?.failures)||0)),locked:Boolean(next?.locked)};
  try{localStorage.setItem(ACCESS_GATE.storageKey,JSON.stringify(gateMemoryState));}catch(e){}
}

async function gateHash(value){
  if(!globalThis.crypto?.subtle) throw new Error("이 브라우저는 안전한 비밀번호 확인 기능을 지원하지 않습니다.");
  const data=new TextEncoder().encode(ACCESS_GATE.salt+value);
  const digest=await crypto.subtle.digest("SHA-256",data);
  return [...new Uint8Array(digest)].map(byte=>byte.toString(16).padStart(2,"0")).join("");
}
function hashesMatch(left,right){
  if(left.length!==right.length) return false;
  let delta=0;
  for(let i=0;i<left.length;i++) delta|=left.charCodeAt(i)^right.charCodeAt(i);
  return delta===0;
}

function validateBank(){
  const ids=new Set(), concepts=new Set(), stems=new Set(), combinations=new Set(), counts={"상":0,"중":0,"하":0};
  BANK.forEach(q=>{
    if(ids.has(q.id)) throw new Error("중복 ID: "+q.id); ids.add(q.id);
    if(concepts.has(q.conceptId)) throw new Error("중복 주제키: "+q.conceptId); concepts.add(q.conceptId);
    if(!["상","중","하"].includes(q.difficulty)) throw new Error("난이도 오류: "+q.id);
    counts[q.difficulty]++;
    if(!Array.isArray(q.o)||q.o.length!==5||new Set(q.o.map(norm)).size!==5||q.a<0||q.a>4) throw new Error("보기 구성 오류: "+q.id);
    const stem=norm(q.q); if(stems.has(stem)) throw new Error("중복 문항문: "+q.id); stems.add(stem);
    const combo=stem+"|"+q.o.map(norm).sort().join("|"); if(combinations.has(combo)) throw new Error("중복 문항·보기 조합: "+q.id); combinations.add(combo);
    if(!q.b || !q.u || !q.v) throw new Error("근거·검토유형 또는 원문 링크 누락: "+q.id);
  });
  if(BANK.length!==500||counts["상"]!==50||counts["중"]!==150||counts["하"]!==300) throw new Error("문제은행 구성 오류");
  const mappedControls=new Set(BANK.filter(q=>q.controlCode).map(q=>q.controlCode));
  const mappedLaws=new Set(BANK.filter(q=>q.lawId).map(q=>q.lawId));
  const longCases=BANK.filter(q=>q.longPassage);
  if(longCases.length!==50 || longCases.some(q=>!q.p || q.p.length<930 || q.p.length>1250 || q.difficulty!=="상")) throw new Error("장문 사례형 문항 구성 오류");
  if(COVERAGE.controls.length!==101 || COVERAGE.laws.length!==43 || mappedControls.size!==101 || mappedLaws.size!==43) throw new Error("출제범위 매핑 오류");
  return {total:BANK.length,counts,duplicateChecks:0,concepts:concepts.size,controls:mappedControls.size,laws:mappedLaws.size,longCases:longCases.length,longPassageMin:Math.min(...longCases.map(q=>q.p.length)),longPassageMax:Math.max(...longCases.map(q=>q.p.length))};
}

function selectNextSet(){
  const meta=loadMeta(), selected=[];
  Object.entries(EXAM_CONFIG).forEach(([difficulty,need])=>{
    const pool=BANK.filter(q=>q.difficulty===difficulty);
    let used=new Set(meta.used?.[difficulty]||[]);
    let available=pool.filter(q=>!used.has(q.id));
    if(available.length<need){used=new Set();meta.used[difficulty]=[];available=[...pool];}
    const picked=shuffle(available).slice(0,need);
    selected.push(...picked);
    meta.used[difficulty]=[...new Set([...(meta.used[difficulty]||[]),...picked.map(q=>q.id)])];
  });
  meta.rounds=(meta.rounds||0)+1; meta.lastSet=selected.map(q=>q.id); saveMeta(meta);
  return shuffle(selected.map(q=>q.id));
}
